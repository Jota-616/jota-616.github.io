  practica:`Antes de dormir, en vez de medirte contra otros, mídete contra ti mismo de ayer: ¿avancé algo? Esa es la única comparación que ayuda.`,
  conversar:`¿La comparación motiva o envenena?`,
  preguntaIncomoda:`¿Cuánto de tu insatisfacción nace de comparar tu vida real con las vitrinas ajenas?`,
  frase:{ texto:`Curioso: nos amamos más que a nadie, pero valoramos más la opinión ajena que la propia.`, autor:"Marco Aurelio", obra:"Meditaciones, XII, 4", tipo:"parafrasis" },
  charlas:[
    { nivel:"Simple",  tema:"¿Compararse está mal?", postura:"Contra vitrinas ajenas, sí.", contra:"A veces inspira a mejorar.", pregunta:"¿Con quién vale compararse?" },
    { nivel:"Profundo",tema:"¿Por qué nos enganchan los likes?", postura:"Premian la aprobación ajena.", contra:"También dan conexión real.", pregunta:"¿Se puede usar la red sin depender de ella?" },
    { nivel:"Filoso",  tema:"¿Vale tu vida por lo que otros opinen?", postura:"La decide tu carácter, no el jurado.", contra:"Vivimos entre la mirada de otros.", pregunta:"¿Se puede no necesitar nada de aprobación?" }
  ]
},
{
  dia:81, ruta:6, titulo:"La prisa y el arte de vivir",
  escuela:"Estoicismo aplicado · Séneca", duracion:"5–8 min", temas:["disciplina","control"],
  entrada:`Vivimos corriendo, ocupadísimos, y al final del día sentimos que no vivimos nada. La prisa no es lo mismo que la vida.`,
  contexto:`Séneca lo escribió en "De la brevedad de la vida": no es que la vida sea corta, es que la malgastamos. Y una de las formas más modernas de malgastarla es la ocupación constante: estar siempre haciendo, sin estar nunca presente.`,
  ideaCentral:`Estar ocupado no es estar viviendo. La prisa perpetua llena las horas pero vacía los días: corres tanto de una cosa a otra que nunca habitas ninguna. La vida, decía Séneca, es lo bastante larga si sabes usarla.`,
  desarrollo:`La cultura moderna premia la ocupación como signo de valor: estar "a full" suena casi a orgullo. Pero vivir apurado es vivir ausente: comes sin saborear, escuchas sin oír, estás sin estar. El estoico distingue actividad de agitación: se puede hacer mucho con calma y poco con frenesí. Reducir la prisa no es hacer menos, es dejar de hacerlo todo en estado de fuga.`,
  ejemplo:`Terminas un día agotado, habiendo hecho mil cosas, y no recuerdas ninguna con gusto. La prisa se comió la experiencia. El que hace menos, pero presente, recuerda haber vivido.`,
  aplicacion:`Hoy, haz una sola cosa sin prisa, con plena presencia: una comida, una caminata, una conversación. Nota la diferencia entre hacer y vivir.`,
  contraste:`Un crítico dirá que la vida moderna exige ritmo y que no todos pueden bajar la velocidad. Verdad: hay obligaciones reales. Pero gran parte de nuestra prisa es autoimpuesta, una adicción a la ocupación. No se trata de no hacer nada, sino de no vivir todo en modo carrera.`,
  practica:`Antes de dormir, repasa: ¿qué hice hoy de verdad presente, y qué hice corriendo sin estar? Elige un momento para vivir sin prisa mañana.`,
  conversar:`¿Estar ocupado es lo mismo que vivir?`,
  preguntaIncomoda:`¿Tu prisa es real, o una forma de no detenerte a mirar tu vida?`,
  frase:{ texto:`La vida, si sabes usarla, es larga.`, autor:"Séneca", obra:"De la brevedad de la vida", tipo:"parafrasis" },
  charlas:[
    { nivel:"Simple",  tema:"¿Estar ocupado es bueno?", postura:"No si te impide vivir.", contra:"Hacer cosas también es vida.", pregunta:"¿Llenar el día es vivirlo?" },
    { nivel:"Profundo",tema:"¿Por qué nos engancha la prisa?", postura:"La ocupación parece dar valor.", contra:"A veces el ritmo es necesario.", pregunta:"¿Cuánta prisa es autoimpuesta?" },
    { nivel:"Filoso",  tema:"¿Vivir es hacer o estar?", postura:"Habitar el momento, no sólo cruzarlo.", contra:"Sin hacer, la vida no avanza.", pregunta:"¿Se vive más rápido o más presente?" }
  ]
},
{
  dia:82, ruta:6, titulo:"Decidir sin ahogarse",
  escuela:"Estoicismo aplicado · Marco Aurelio", duracion:"5–8 min", temas:["control","disciplina"],
  entrada:`Nunca tuvimos tantas opciones ni tanta dificultad para elegir. A veces el problema no es decidir mal, sino no decidir de tanto analizar.`,
  contexto:`Marco Aurelio se daba una receta contra la sobrecarga: haz menos, pero lo esencial. La mayoría de lo que decimos y hacemos no es necesario; preguntarse "¿esto hace falta?" libera tiempo y calma a la vez.`,
  ideaCentral:`Frente a la abundancia de opciones e información, la sabiduría no es analizarlo todo, sino distinguir lo esencial y actuar. El exceso de análisis es una forma elegante de no hacer nada.`,
  desarrollo:`La parálisis por análisis es muy moderna: tantas alternativas, tantos datos, tantos "y si", que la mente se queda girando sin decidir. El estoico corta el nudo con dos preguntas: ¿esto es necesario? y ¿qué depende de mí aquí? Luego actúa con la cláusula de reserva —"lo haré lo mejor posible, si nada lo impide"—, aceptando que ninguna decisión es perfecta ni con certeza total. Decidir y avanzar enseña más que analizar y esperar.`,
  ejemplo:`Pasas semanas comparando opciones para una compra menor, juntando reseñas y dudas, sin elegir. El tiempo perdido vale más que la diferencia entre las opciones. Decidir "suficientemente bien" y seguir habría sido más sabio.`,
  aplicacion:`Hoy, ante una decisión que vienes postergando por analizarla, aplícale dos preguntas —¿es necesario?, ¿qué depende de mí?— y decide. Lo bastante bueno, hecho, supera a lo perfecto, pensado.`,
  contraste:`Un crítico dirá que algunas decisiones sí merecen análisis profundo, y es cierto: no todo se resuelve rápido. La clave es proporción: reservar el análisis largo para lo importante e irreversible, y decidir ágil en lo demás, que es casi todo.`,
  practica:`Antes de dormir, identifica una decisión que estás sobre-pensando. Define el primer paso pequeño que darás mañana para destrabarla.`,
  conversar:`¿Se decide mejor pensando mucho o actuando y ajustando?`,
  preguntaIncomoda:`¿Cuántas cosas no haces por "seguir evaluando", cuando en realidad ya sabes la respuesta?`,
  frase:{ texto:`Haz menos, pero lo esencial: pregúntate siempre, ¿es esto necesario?`, autor:"Marco Aurelio", obra:"Meditaciones, IV, 24", tipo:"parafrasis" },
  charlas:[
    { nivel:"Simple",  tema:"¿Pensar mucho antes de decidir es bueno?", postura:"Hasta cierto punto; luego paraliza.", contra:"Decidir rápido lleva a errores.", pregunta:"¿Cuándo dejar de analizar?" },
    { nivel:"Profundo",tema:"¿Por qué nos cuesta tanto elegir hoy?", postura:"Demasiadas opciones e información.", contra:"Más opciones también es libertad.", pregunta:"¿Elegir bien necesita menos opciones?" },
    { nivel:"Filoso",  tema:"¿Existe la decisión perfecta?", postura:"No: se decide con lo que hay y se ajusta.", contra:"Algunas decisiones no admiten error.", pregunta:"¿Es mejor lo bueno hecho o lo perfecto pensado?" }
  ]
},
{
  dia:83, ruta:6, titulo:"El obstáculo es el camino",
  escuela:"Estoicismo aplicado · Marco Aurelio", duracion:"5–8 min", temas:["virtud","control"],
  entrada:`Lo que se interpone en tu camino, bien usado, puede convertirse en el camino mismo. La piedra que te frena puede ser el escalón que te sube.`,
  contexto:`Marco Aurelio dejó una de las frases más potentes del estoicismo: lo que se interpone a la acción se vuelve, en realidad, un impulso a la acción; lo que estorba el camino se convierte en camino. El obstáculo no sólo se soporta: se aprovecha.`,
  ideaCentral:`La adversidad no es sólo algo que hay que aguantar: es materia prima. Cada obstáculo trae una oportunidad de practicar una virtud —paciencia, ingenio, coraje— que sin él no existiría. Lo que te frena puede enseñarte a avanzar distinto.`,
  desarrollo:`La mente común ve el obstáculo como interrupción del plan; el estoico lo ve como parte del plan. No porque todo lo malo sea bueno —no lo es—, sino porque siempre hay una respuesta virtuosa posible que el obstáculo hace necesaria. El despido obliga a reinventarse; el conflicto, a aprender a dialogar; el límite, a la creatividad. El obstáculo no garantiza el crecimiento, pero lo hace posible para quien lo mira así.`,
  ejemplo:`Un proyecto se cae a último minuto. Puedes vivirlo sólo como fracaso, o como la ocasión de construir algo mejor que sin esa caída no habrías intentado. Muchas buenas historias empiezan en un plan arruinado.`,
  aplicacion:`Hoy, ante un contratiempo, pregúntate: ¿qué virtud o qué camino nuevo me está exigiendo —o regalando— este obstáculo?`,
  contraste:`Un crítico dirá que esto puede volverse un optimismo tóxico que niega el dolor real ("todo pasa por algo"). Cuidado con eso: no todo obstáculo es un regalo, y forzar un "lado bueno" puede ofender al que sufre. La idea no es que el obstáculo sea bueno, sino que casi siempre permite una respuesta buena.`,
  practica:`Antes de dormir, toma un obstáculo de hoy y encuentra una sola cosa que te obligó a hacer mejor o a aprender. No para negar el problema: para no desperdiciarlo.`,
  conversar:`¿El obstáculo es interrupción o materia prima?`,
  preguntaIncomoda:`¿Qué dificultad reciente estás viviendo sólo como freno, sin ver qué te está enseñando?`,
  frase:{ texto:`Lo que se interpone en el camino se vuelve el camino.`, autor:"Marco Aurelio", obra:"Meditaciones, V, 20", tipo:"parafrasis" },
  charlas:[
    { nivel:"Simple",  tema:"¿Los problemas pueden servir?", postura:"Bien usados, enseñan o impulsan.", contra:"Algunos sólo hacen daño.", pregunta:"¿Todo obstáculo tiene un lado útil?" },
    { nivel:"Profundo",tema:"¿'Todo pasa por algo' es sabiduría?", postura:"No; la sabiduría es responder bien, no que todo sea bueno.", contra:"A veces consuela creerlo.", pregunta:"¿Hay un propósito o sólo respuestas posibles?" },
    { nivel:"Filoso",  tema:"¿El crecimiento necesita adversidad?", postura:"La adversidad lo hace posible, no seguro.", contra:"Hay quien crece sin sufrir.", pregunta:"¿Se puede madurar sin obstáculos?" }
  ]
},
{
  dia:84, ruta:6, titulo:"La gratitud diaria",
  escuela:"Estoicismo aplicado · Marco Aurelio", duracion:"5–8 min", temas:["virtud"],
  entrada:`La forma más rápida de cambiar cómo te sientes no es conseguir más, sino mirar lo que ya tienes con otros ojos.`,
  contexto:`Marco Aurelio abría sus "Meditaciones" con páginas de agradecimiento: a su abuelo, a su madre, a sus maestros, por cada cosa que aprendió de ellos. Un emperador empezando por dar las gracias.`,
  ideaCentral:`La gratitud es el antídoto directo contra la insatisfacción crónica que nos vende el mundo moderno. Entrenar la mirada para ver lo que tienes —y no sólo lo que falta— transforma la experiencia de un mismo día.`,
  desarrollo:`Vivimos en una cultura del "más": más éxito, más cosas, más logros, siempre apuntando a lo que no tenemos. Esa mirada garantiza insatisfacción, porque siempre falta algo. La gratitud invierte el foco: en vez de medir la distancia hacia lo que deseas, reconoce lo que ya está. No es negar lo que falta ni conformarse: es dejar de ser ciego a lo que abunda. Y, a diferencia de casi todo, depende sólo de ti.`,
  ejemplo:`Dos personas con vidas parecidas. Una repasa cada noche lo que le faltó; otra, tres cosas que agradece. Con los meses, viven el mismo mundo de un humor opuesto. La diferencia fue dónde pusieron los ojos.`,
  aplicacion:`Hoy, antes de pedirle algo más a la vida, detente a reconocer tres cosas que ya tienes y que alguien, en otro lugar, daría todo por tener.`,
  contraste:`Un crítico dirá que la gratitud puede usarse para acallar reclamos legítimos ("agradece lo que tienes" dicho a quien sufre injusticia). Verdad: la gratitud no debe anular la lucha por lo justo. Son compatibles: se puede agradecer lo que hay y pelear por lo que falta.`,
  practica:`Antes de dormir, nombra tres cosas concretas de hoy por las que estás agradecido. Hazlo cada noche y observa cómo cambia tu mirada.`,
  conversar:`¿La gratitud nos hace conformistas o más felices?`,
  preguntaIncomoda:`¿Pasas más tiempo mirando lo que te falta que agradeciendo lo que ya tienes?`,
  frase:{ texto:`Empieza el día reconociendo lo que debes a quienes te formaron.`, autor:"Marco Aurelio", obra:"Meditaciones, I", tipo:"parafrasis" },
  charlas:[
    { nivel:"Simple",  tema:"¿Agradecer cambia algo?", postura:"Cambia dónde miras y cómo te sientes.", contra:"No cambia los problemas.", pregunta:"¿Sirve agradecer si falta lo importante?" },
    { nivel:"Profundo",tema:"¿La gratitud vuelve conformista?", postura:"No: se agradece y se sigue luchando.", contra:"Puede usarse para callar reclamos.", pregunta:"¿Dónde acaba agradecer y empieza resignarse?" },
    { nivel:"Filoso",  tema:"¿La felicidad es tener o mirar bien?", postura:"Mucho depende de dónde pones los ojos.", contra:"Sin lo básico, no basta mirar.", pregunta:"¿Cuánto de la felicidad es perspectiva?" }
  ]
},
{
  dia:85, ruta:6, titulo:"El descanso no es pereza",
  escuela:"Estoicismo aplicado · Séneca", duracion:"5–8 min", temas:["disciplina","virtud"],
  entrada:`En una cultura que premia estar siempre ocupado, descansar parece casi una falta. Pero el ánimo, como un arco, se rompe si nunca se afloja.`,
  contexto:`Séneca defendía el descanso como parte de una vida sabia: hay que dar reposo al ánimo, decía, porque vuelve mejor y más agudo. No el descanso como huida, sino como recarga deliberada.`,
  ideaCentral:`El descanso no es lo contrario de la virtud ni una concesión culpable: es una condición para sostenerla. Quien nunca para se agota, se embota y rinde menos; quien descansa con intención vuelve más capaz.`,
  desarrollo:`La trampa moderna es ver el ocio como tiempo perdido y llenarlo de culpa o de más pantallas. Pero el descanso verdadero —dormir bien, pasear, no hacer nada útil un rato— no es pereza: es mantenimiento. Séneca lo comparaba con los campos, que necesitan descansar para volver a dar fruto. Descansar a propósito es tan disciplinado como trabajar; lo indisciplinado es quemarse.`,
  ejemplo:`Trabajas sin parar creyéndote más productivo, y a la semana rindes la mitad, irritable y torpe. El que se permitió descansar volvió fresco y avanzó más. El descanso no te restó: te sostuvo.`,
  aplicacion:`Hoy, dale a tu mente un descanso real y sin culpa: un rato sin pantalla, sin tarea, sin "deber". No como premio, sino como mantenimiento.`,
  contraste:`Un crítico dirá que el descanso puede volverse excusa para la pereza, y es verdad: hay quien confunde descansar con evadir siempre. La clave es la intención: descansar para volver mejor, no para huir del esfuerzo. Reposo, no fuga.`,
  practica:`Antes de dormir, repasa si hoy le diste a tu mente algún reposo real, o la tuviste a full todo el día. Planea un descanso intencional para mañana.`,
  conversar:`¿Descansar es perder el tiempo o es parte de vivir bien?`,
  preguntaIncomoda:`¿Sientes culpa al descansar, como si sólo valieras cuando produces?`,
  frase:{ texto:`Hay que dar reposo al ánimo: vuelve mejor y más agudo.`, autor:"Séneca", obra:"De la tranquilidad del alma, 17", tipo:"parafrasis" },
  charlas:[
    { nivel:"Simple",  tema:"¿Descansar es pereza?", postura:"Es mantenimiento, no fuga.", contra:"Algunos descansan de más.", pregunta:"¿Cuánto descanso es sano?" },
    { nivel:"Profundo",tema:"¿Por qué nos da culpa descansar?", postura:"Creemos que sólo valemos produciendo.", contra:"Hay que rendir para vivir.", pregunta:"¿Vales por lo que haces o por lo que eres?" },
    { nivel:"Filoso",  tema:"¿El ocio es vacío o es parte de la vida?", postura:"Sin reposo, el resto se quiebra.", contra:"Demasiado ocio embota.", pregunta:"¿Se vive para trabajar o se trabaja para vivir?" }
  ]
},
{
  dia:86, ruta:6, titulo:"Cuidar el cuerpo",
  escuela:"Estoicismo aplicado · Juvenal", duracion:"5–8 min", temas:["disciplina","virtud"],
  entrada:`No eres sólo una mente que piensa: habitas un cuerpo, y cuidarlo bien es parte de vivir con disciplina, no una vanidad.`,
  contexto:`La sabiduría antigua ya unía cuerpo y mente: el poeta Juvenal pedía "una mente sana en un cuerpo sano". Los estoicos, aunque enseñaban que el cuerpo no es lo más importante, lo consideraban un instrumento que hay que mantener para poder vivir y actuar bien.`,
  ideaCentral:`Cuidar el cuerpo —dormir, moverse, comer con medida— no es obsesión estética ni distracción de lo espiritual: es disciplina aplicada al instrumento con el que vives. Un cuerpo descuidado limita la mente; uno cuidado la sostiene.`,
  desarrollo:`El estoico no idolatra el cuerpo (recuerda que es prestado y mortal) ni lo desprecia: lo cuida como cuida una herramienta de trabajo. El sueño, el ejercicio y la alimentación no son temas menores: afectan directamente el ánimo, la claridad y la voluntad. Muchas batallas mentales se ganan o se pierden en el cuerpo. Tratarlo bien es una forma concreta y diaria de respeto por la vida que te tocó.`,
  ejemplo:`Duermes mal varios días y de pronto todo te irrita, todo te cuesta, todo se ve peor. No cambió el mundo: cambió tu cuerpo. Cuidarlo no es vanidad: es cuidar tu capacidad de vivir bien.`,
  aplicacion:`Hoy, haz una sola cosa concreta por tu cuerpo —caminar, dormir a tiempo, comer con medida— entendiéndola como disciplina, no como sacrificio.`,
  contraste:`El riesgo moderno es el opuesto: convertir el cuidado del cuerpo en obsesión, culto a la imagen o tiranía del rendimiento. El estoico cuida el cuerpo sin idolatrarlo: ni lo descuida ni lo convierte en su dios. Equilibrio, no fanatismo.`,
  practica:`Antes de dormir, reconoce cómo trataste hoy tu cuerpo y elige un cuidado concreto para mañana, sin culpa ni obsesión.`,
  conversar:`¿Cuidar el cuerpo es disciplina o vanidad?`,
  preguntaIncomoda:`¿Cuidas más tu teléfono o tu cuerpo?`,
  frase:{ texto:`Hay que pedir una mente sana en un cuerpo sano.`, autor:"Juvenal", obra:"Sátiras, X", tipo:"traduccion" },
  charlas:[
    { nivel:"Simple",  tema:"¿El cuerpo importa para la mente?", postura:"Mucho: el ánimo vive en el cuerpo.", contra:"La mente puede sobreponerse.", pregunta:"¿Cuánto de tu ánimo es físico?" },
    { nivel:"Profundo",tema:"¿Cuidar el cuerpo es superficial?", postura:"Es cuidar tu instrumento de vivir.", contra:"Puede volverse culto a la imagen.", pregunta:"¿Dónde acaba cuidado y empieza obsesión?" },
    { nivel:"Filoso",  tema:"¿Eres tu cuerpo o sólo lo habitas?", postura:"Lo habitas, pero te condiciona.", contra:"Mente y cuerpo quizá son uno.", pregunta:"¿Hay un 'tú' separado del cuerpo?" }
  ]
},
{
  dia:87, ruta:6, titulo:"No estamos hechos para la soledad",
  escuela:"Estoicismo aplicado · Aristóteles", duracion:"5–8 min", temas:["familia","virtud"],
  entrada:`Nunca estuvimos tan conectados y tan solos a la vez. La paradoja moderna: mil contactos en la pantalla, pocos vínculos de verdad.`,
  contexto:`Aristóteles lo dijo hace milenios: el ser humano es por naturaleza un animal social. No nos realizamos aislados, sino en comunidad. Los estoicos coincidían: somos parte de un cuerpo común, y aislarnos va contra nuestra naturaleza.`,
  ideaCentral:`Por más fuerte que sea tu mundo interior, no estás hecho para vivir aislado. Los vínculos reales —no los digitales superficiales— son una necesidad, no un lujo. Cultivarlos es parte de vivir conforme a tu naturaleza.`,
  desarrollo:`La vida moderna facilita una soledad disfrazada de conexión: muchos seguidores, pocas conversaciones hondas; mucha interacción, poco encuentro. El estoicismo, mal entendido como autosuficiencia total, podría usarse para justificar el aislamiento. Pero su raíz dice lo contrario: somos sociales, nos debemos a los demás, y la fortaleza interior se cultiva para servir mejor, no para encerrarse. Buscar vínculos reales no es debilidad: es naturaleza.`,
  ejemplo:`Pasas la noche "conectado" —chats, redes, videos— y te acuestas más solo que antes. Una sola conversación real, cara a cara, habría hecho más por ti que cien interacciones de pantalla.`,
  aplicacion:`Hoy, busca un encuentro real —una llamada de verdad, un rato presente con alguien— en vez de otra dosis de conexión superficial.`,
  contraste:`Un crítico dirá que también se necesita soledad, y tiene razón: el recogimiento es valioso y sano. La cuestión no es elegir entre estar solo o acompañado, sino no confundir la soledad elegida con el aislamiento por descuido, ni la conexión digital con el vínculo real.`,
  practica:`Antes de dormir, pregúntate: ¿tuve hoy algún encuentro humano de verdad, o sólo interacciones de pantalla? Decide cuidar un vínculo real mañana.`,
  conversar:`¿La hiperconexión nos une o nos aísla?`,

/* ============================================================
   ESTADO (persistencia con degradación elegante)
   ============================================================ */
const STORE_KEY = "stoaNocturna.v1";
const XP_LECTURA = 20;
const XP_DIARIO  = 10;

const estadoBase = {
  leidas:[],          // [dia,...]
  diario:{},          // { "YYYY-MM-DD": {q1:"",...} }
  xp:0,
  rachaActual:0,
  rachaMax:0,
  ultimaFecha:null,   // "YYYY-MM-DD"
  diaActual:1,        // próxima lección sugerida
  nocheProfunda:false,
  filtroTema:null
};

let usaMemoria = false;      // true si localStorage no está disponible o no persiste

// Prueba real de escritura/lectura/borrado: si falla, no hay guardado.
(function probarStorage(){
  try{
    const k = "__stoa_test__";
    localStorage.setItem(k, "1");
    if(localStorage.getItem(k) !== "1") usaMemoria = true;
    localStorage.removeItem(k);
  }catch(e){ usaMemoria = true; }
})();

let estado = cargar();

function cargar(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) return Object.assign({}, estadoBase, JSON.parse(raw));
  }catch(e){ usaMemoria = true; }
  return Object.assign({}, estadoBase);
}
function guardar(){
  if(usaMemoria) return;
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(estado)); }
  catch(e){ usaMemoria = true; }
}

// En iPhone, un archivo abierto localmente (file://) puede no conservar datos
// entre sesiones aunque la escritura no falle: lo tratamos como NO fiable.
function persistenciaDudosa(){
  return usaMemoria || location.protocol === "file:";
}

// Respaldo COMPLETO de todo el estado (progreso, XP, racha, diario) a un archivo.
function respaldoCompleto(){
  try{
    const blob = new Blob([JSON.stringify(estado, null, 2)], {type:"application/json;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "stoa-respaldo-" + hoyStr() + ".json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1500);
    toast("Respaldo descargado. Guárdalo en Archivos.");
  }catch(e){ toast("No se pudo crear el respaldo."); }
}

// Restaurar el estado desde un archivo de respaldo previamente guardado.
function restaurarRespaldo(){
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = "application/json,.json";
  inp.onchange = ()=>{
    const f = inp.files && inp.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = ()=>{
      try{
        const obj = JSON.parse(r.result);
        if(typeof obj !== "object" || obj === null) throw 0;
        estado = Object.assign({}, estadoBase, obj);
        guardar();
        renderHoy(); renderCamino(); renderSello();
        document.body.classList.toggle("deep", !!estado.nocheProfunda);
        toast("Respaldo restaurado ✓");
      }catch(e){ toast("Archivo de respaldo no válido."); }
    };
    r.readAsText(f);
  };
  inp.click();
}

/* Fecha local YYYY-MM-DD */
function hoyStr(){
  const d = new Date(); const z = n => String(n).padStart(2,"0");
  return d.getFullYear()+"-"+z(d.getMonth()+1)+"-"+z(d.getDate());
}
function diffDias(a,b){
  return Math.round((new Date(b)-new Date(a))/86400000);
}

/* ============================================================
   LÓGICA
   ============================================================ */
function leccionPorDia(d){ return LECCIONES.find(l=>l.dia===d); }
function leccionActual(){ return leccionPorDia(estado.diaActual) || LECCIONES[0]; }

function marcarLeida(dia){
  if(estado.leidas.includes(dia)){ toast("Ya estaba marcada como leída."); return; }
  estado.leidas.push(dia);
  estado.xp += XP_LECTURA;
  actualizarRacha();
  // sugerir siguiente día no leído
  const sig = LECCIONES.find(l=>!estado.leidas.includes(l.dia));
  estado.diaActual = sig ? sig.dia : dia;
  guardar();
  toast("Lectura completada · +"+XP_LECTURA+" XP");
  renderHoy(); renderCamino(); renderSello();
}

function actualizarRacha(){
  const h = hoyStr();
  if(estado.ultimaFecha === h){ /* misma jornada, racha intacta */ }
  else if(estado.ultimaFecha && diffDias(estado.ultimaFecha,h)===1){ estado.rachaActual += 1; }
  else { estado.rachaActual = 1; }
  estado.ultimaFecha = h;
  estado.rachaMax = Math.max(estado.rachaMax, estado.rachaActual);
}

function rangoActual(){
  let r = RANGOS[0];
  for(const x of RANGOS){ if(estado.xp >= x.xp) r = x; }
  return r;
}
function rangoSiguiente(){
  return RANGOS.find(x => x.xp > estado.xp) || null;
}

    <div class="section deep-hide"><h3>Contexto</h3><p>${esc(l.contexto)}</p></div>
    <div class="section"><h3>Idea central</h3><p>${esc(l.ideaCentral)}</p></div>
    <div class="section deep-hide"><h3>Desarrollo</h3><p>${esc(l.desarrollo)}</p></div>
    <div class="section deep-hide"><h3>Ejemplo real</h3><p>${esc(l.ejemplo)}</p></div>
    <div class="section"><h3>Aplicación práctica</h3><p>${esc(l.aplicacion)}</p></div>
    <div class="section deep-hide"><h3>Contraste</h3><p>${esc(l.contraste)}</p></div>

    <div class="practice"><h3>Práctica nocturna · 3 min</h3><p>${esc(l.practica)}</p></div>

    <div class="uncomfortable"><h3>Pregunta incómoda de la noche</h3><p>${esc(l.preguntaIncomoda)}</p></div>

    <div class="quote">
      <div class="q-text">“${esc(fr.texto)}”</div>
      <div class="q-src">— ${esc(fr.autor)}, ${esc(fr.obra)}
        <span class="tag-src ${fr.tipo}">${fr.tipo==="cita"?"cita textual":fr.tipo==="traduccion"?"traducción":"paráfrasis"}</span>
      </div>
    </div>

    <div class="divider deep-hide"><span>◆ para conversar mañana ◆</span></div>
    <div class="section deep-hide"><h3>Idea para conversar</h3><p>${esc(l.conversar)}</p></div>
    <div class="deep-hide">${charlas}</div>

    <div class="actions">
      <button class="btn btn-primary ${leida?"done":""}" id="btn-leido">${leida?"✓ Leída":"Marcar como leído"}</button>
      <button class="btn btn-ghost" id="btn-random2">Lección al azar</button>
    </div>
  </article></div>`;

  $("#btn-leido").onclick = ()=> marcarLeida(l.dia);
  $("#btn-random2").onclick = leccionAzar;
}

/* ---- CAMINO (rutas + filtro temas + path) ---- */
function renderCamino(){
  const chips = ["Todos",...TEMAS].map(t=>{
    const val = t==="Todos"?null:t;
    const act = (estado.filtroTema===val)?"active":"";
    return `<button class="chip ${act}" data-tema="${val??""}">${t}</button>`;
  }).join("");

  const liDe = l=>{
    const leida = estado.leidas.includes(l.dia);
    const cls = leida?"read":"available";
    const mark = leida?"✓":l.dia;
    return `<li class="${cls}">
      <span class="node">${mark}</span>
      <button class="day-card" data-dia="${l.dia}">
        <div class="dc-day">Día ${l.dia} · ${esc(l.escuela.split("·").pop().trim())}</div>
        <div class="dc-title">${esc(l.titulo)}</div>
        <div class="dc-sub">${leida?"Completada":"Disponible"} · ${esc(l.temas.join(", "))}</div>
      </button>
    </li>`;
  };

  const bloques = RUTAS.map(r=>{
    const todas = LECCIONES.filter(l=>l.ruta===r.id);
    if(!todas.length){
      return `<div class="route-head" style="margin-top:26px"><h2>Ruta ${r.id} · ${esc(r.nombre)}</h2><p>Próximamente</p></div>`;
    }
    const vis = estado.filtroTema ? todas.filter(l=>l.temas.includes(estado.filtroTema)) : todas;
    if(!vis.length) return "";
    const hechas = todas.filter(l=>estado.leidas.includes(l.dia)).length;
    return `<div class="route-head" style="margin-top:26px"><h2>Ruta ${r.id} · ${esc(r.nombre)}</h2><p>${hechas}/${todas.length} completadas</p></div><ul class="path">${vis.map(liDe).join("")}</ul>`;
  }).join("");

  $("#view-camino").innerHTML = `
    <div class="route-head"><h2>Camino</h2><p>Una lección por noche. Filtra por tema si buscas algo puntual.</p></div>
    <div class="chips">${chips}</div>
    ${bloques || '<p style="color:var(--muted)">Sin lecciones para ese tema todavía.</p>'}
  `;

  $("#view-camino").querySelectorAll(".chip").forEach(c=>{
    c.onclick = ()=>{ const v=c.dataset.tema; estado.filtroTema = v||null; guardar(); renderCamino(); };
  });
  $("#view-camino").querySelectorAll(".day-card[data-dia]").forEach(b=>{
    b.onclick = ()=>{ estado.diaActual = +b.dataset.dia; guardar(); renderHoy(); irA("hoy"); };
  });
}

/* ---- BIBLIOTECA ---- */
function renderBiblioteca(){
  const fichas = FICHAS.map(f=>`
    <details class="ficha">
      <summary>
        <div class="f-name">${esc(f.n)}</div>
        <div class="f-life">${esc(f.v)}</div>
      </summary>
      <div class="f-body">
        <div class="fb"><b>Quién fue</b><span>${esc(f.quien)}</span></div>
        <div class="fb"><b>Qué pensaba</b><span>${esc(f.penso)}</span></div>
        <div class="fb"><b>Qué tomar de él</b><span>${esc(f.tomar)}</span></div>
        <div class="fb"><b>Qué cuestionarle</b><span>${esc(f.cuestionar)}</span></div>
        <div class="fb"><b>Lección recomendada</b><span>${esc(f.tema)}</span></div>
      </div>
    </details>`).join("");

  $("#view-biblioteca").innerHTML = `
    <div class="route-head"><h2>Biblioteca</h2><p>Quiénes pensaron esto, y por qué conviene discutirles.</p></div>
    <div class="lib-grid">${fichas}</div>`;
}

/* ---- DIARIO ---- */
function renderDiario(){
  const h = hoyStr();
  const hoy = estado.diario[h] || {};
  const campos = DIARIO_Q.map(q=>`
    <div class="journal-q">
      <label for="${q.id}">${esc(q.txt)}</label>
      <textarea id="${q.id}" data-q="${q.id}" placeholder="Escribe sin juzgarte…">${esc(hoy[q.id]||"")}</textarea>
    </div>`).join("");

  $("#view-diario").innerHTML = `
    <div class="route-head"><h2>Diario filosófico</h2><p>${esc(h)} · se guarda solo en este dispositivo.</p></div>
    ${campos}
    <div class="saved-note" id="diario-note"></div>
    <div class="actions">
      <button class="btn btn-primary" id="btn-guardar-diario">Guardar la noche</button>
      <button class="btn btn-ghost" id="btn-export">Exportar a Markdown</button>
      <button class="btn btn-ghost" id="btn-export-libro">Exportar para mi libro</button>
    </div>`;

  $("#view-diario").querySelectorAll("textarea").forEach(t=>{
    t.addEventListener("input", ()=>{ $("#diario-note").textContent = "Cambios sin guardar…"; });
  });
  $("#btn-guardar-diario").onclick = guardarDiario;
  $("#btn-export").onclick = exportarDiario;
  $("#btn-export-libro").onclick = exportarLibro;
}

function guardarDiario(){
  const h = hoyStr();
  const entrada = {};
  let algo = false;
  $("#view-diario").querySelectorAll("textarea").forEach(t=>{
    entrada[t.dataset.q] = t.value.trim();
    if(t.value.trim()) algo = true;
  });
  const eraNueva = !estado.diario[h];
  if(algo){
    estado.diario[h] = entrada;
    if(eraNueva){ estado.xp += XP_DIARIO; }
  } else {
    delete estado.diario[h];
  }
  guardar();
  $("#diario-note").textContent = algo ? "Guardado ✓" : "Entrada vacía: nada que guardar.";
  renderSello();
}

function exportarDiario(){
  const fechas = Object.keys(estado.diario).sort();
  if(!fechas.length){ toast("Aún no hay entradas que exportar."); return; }
  let md = "# Diario — Stoa Nocturna\n\n";
  fechas.forEach(f=>{
    md += `## ${f}\n\n`;
    DIARIO_Q.forEach(q=>{
      const a = estado.diario[f][q.id];
      if(a){ md += `**${q.txt}**\n\n${a}\n\n`; }
    });
    md += "---\n\n";
  });
  const blob = new Blob([md], {type:"text/markdown;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "diario-stoa-nocturna.md";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
  toast("Diario exportado.");
}

function exportarLibro(){
  const fechas = Object.keys(estado.diario).sort();
  if(!fechas.length){ toast("Aún no hay entradas que exportar."); return; }
  const meses = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  function fechaLarga(f){
    const p = f.split("-"); if(p.length!==3) return f;
    const d = parseInt(p[2],10), m = parseInt(p[1],10)-1, y = p[0];
    return `${d} de ${meses[m]||""} de ${y}`;
  }
  let md = "# Entre Sueños y Delirios\n";
  md += "### Material de diario — recogido en Stoa Nocturna\n\n";
  md += "_Reflexiones nocturnas, en bruto, para integrar al libro. " + fechas.length + " noche(s) registrada(s)._\n\n";
  md += "* * *\n\n";
  let n = 0;
  fechas.forEach(f=>{
    const e = estado.diario[f] || {};
    const partes = DIARIO_Q.map(q=> (e[q.id]||"").trim()).filter(Boolean);
    if(!partes.length) return;
    n++;
    md += `## ${fechaLarga(f)}\n\n`;
    // Las respuestas se entregan como prosa corrida, sin el enunciado de la pregunta,
    // para que sirvan de material narrativo directo.
    md += partes.join("\n\n") + "\n\n";
    md += "* * *\n\n";
  });
  if(!n){ toast("Las entradas están vacías."); return; }
  const blob = new Blob([md], {type:"text/markdown;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "entre-suenos-y-delirios-diario.md";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
  toast("Material para tu libro exportado.");
}

/* ---- SELLO (progreso) ---- */
function renderSello(){
  const r = rangoActual();
  const sig = rangoSiguiente();
  const pct = sig ? Math.min(100, Math.round((estado.xp - r.xp)/(sig.xp - r.xp)*100)) : 100;

  const badges = INSIGNIAS.map(b=>{
    const got = b.test(estado);
    return `<div class="badge ${got?"earned":""}">
      <div class="b-ico">${b.ico}</div>
      <div class="b-name">${esc(b.nombre)}</div>
      <div class="b-desc">${esc(b.desc)}</div>
    </div>`;
  }).join("");

  const virtudes = DESAFIOS.map(d=>`
    <div class="virtue"><div class="v-name">${esc(d.v)}</div><div class="v-task">${esc(d.t)}</div></div>`).join("");

  $("#view-sello").innerHTML = `
    <div class="seal-card">
      <svg class="seal-emblem" viewBox="0 0 24 24" fill="none" stroke="#C8A24B" stroke-width="1.2">
        <circle cx="12" cy="12" r="9"/><path d="M12 4l2.2 4.6 5 .5-3.8 3.3 1.2 4.9L12 14.8 7.4 17.3l1.2-4.9L4.8 9.1l5-.5z" fill="rgba(200,162,75,0.15)"/>
      </svg>
      <div class="seal-rank">${esc(r.nombre)}</div>
      <div class="seal-xp">${estado.xp} XP acumulados</div>
      <div class="xp-bar"><i style="width:${pct}%"></i></div>
      <div class="next-rank">${sig ? `${sig.xp - estado.xp} XP para ${esc(sig.nombre)}` : "Rango máximo alcanzado"}</div>
    </div>

    <div class="stats-row">
      <div class="stat"><div class="n">${estado.leidas.length}</div><div class="l">Lecturas</div></div>
      <div class="stat"><div class="n">${estado.rachaActual}</div><div class="l">Racha</div></div>
      <div class="stat"><div class="n">${Object.keys(estado.diario).length}</div><div class="l">Noches escritas</div></div>
    </div>

    <div class="subhead">Insignias</div>
    <div class="badge-grid">${badges}</div>

    <div class="subhead">Desafíos de virtud</div>
    <div class="virtue-grid">${virtudes}</div>

    <div class="caution">
      <h3>El estoicismo no es lo que parece</h3>
      <ul>
        <li>No es reprimir las emociones.</li>
        <li>No es aguantar abusos.</li>
        <li>No es volverse frío ni indiferente.</li>
        <li>No es productividad tóxica.</li>
        <li>No es resignación cobarde.</li>
      </ul>
      <div class="is">Es entrenar el juicio, el carácter y la acción correcta.</div>
    </div>

    <div class="subhead">Datos y respaldo</div>
    <div class="actions">
      <button class="btn btn-primary" id="btn-respaldar">Respaldar mis datos</button>
      <button class="btn btn-ghost" id="btn-restaurar">Restaurar respaldo</button>
    </div>
    <div class="saved-note">${ persistenciaDudosa()
      ? "⚠ Estás abriendo la app como archivo local: tu progreso NO se guarda solo. Respalda seguido, o publica la app en una dirección web (https) para que guarde sola."
      : "Tu progreso se guarda en este navegador. Aun así, respalda de vez en cuando por seguridad." }</div>`;

  $("#btn-respaldar").onclick = respaldoCompleto;
  $("#btn-restaurar").onclick = restaurarRespaldo;
}

/* ============================================================
   NAVEGACIÓN Y CONTROLES GLOBALES
   ============================================================ */
function irA(vista){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  $("#view-"+vista).classList.add("active");
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.toggle("active", b.dataset.view===vista));
  window.scrollTo({top:0, behavior:"instant"});
}

document.querySelectorAll(".nav-btn").forEach(b=>{
  b.onclick = ()=>{
    const v = b.dataset.view;
    if(v==="camino") renderCamino();
    if(v==="biblioteca") renderBiblioteca();
    if(v==="diario") renderDiario();
    if(v==="sello") renderSello();
    irA(v);
  };
});

function leccionAzar(){
  const otras = LECCIONES.filter(l=>l.dia!==estado.diaActual);
  const pick = (otras.length?otras:LECCIONES)[Math.floor(Math.random()*(otras.length?otras.length:LECCIONES.length))];
  estado.diaActual = pick.dia; guardar();
  renderHoy(); irA("hoy");
  toast("Lección al azar: Día "+pick.dia);
}

$("#btn-random").onclick = leccionAzar;

function toggleDeep(){
  estado.nocheProfunda = !estado.nocheProfunda;
  document.body.classList.toggle("deep", estado.nocheProfunda);
  $("#btn-deep").classList.toggle("active", estado.nocheProfunda);
  guardar();
}
$("#btn-deep").onclick = toggleDeep;

function avisoPersistencia(){
  if(!persistenciaDudosa()) return;
  if(document.getElementById("aviso-persist")) return;
  const b = document.createElement("div");
  b.id = "aviso-persist";
  b.setAttribute("style","margin:12px 16px 0;padding:13px 15px;border:1px solid #B06A3C;background:#241a12;color:#E9E0C8;border-radius:14px;font-size:14px;line-height:1.5;");
  b.innerHTML = '<strong style="color:#C8A24B;">⚠ Tu progreso no se está guardando solo.</strong><br>'
    + 'Abriste la app como archivo local y Safari no lo conserva entre sesiones. '
    + 'Respalda tus datos en un archivo, o publica la app en una dirección web (https) para que guarde sola.'
    + '<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;">'
    + '<button id="aviso-respaldar" class="btn btn-primary" style="padding:7px 13px;">Respaldar ahora</button>'
    + '<button id="aviso-restaurar" class="btn btn-ghost" style="padding:7px 13px;">Restaurar</button>'
    + '<button id="aviso-ocultar" class="btn btn-ghost" style="padding:7px 13px;">Ocultar</button></div>';
  const main = document.querySelector("main");
  main.insertBefore(b, main.firstChild);
  $("#aviso-respaldar").onclick = respaldoCompleto;
  $("#aviso-restaurar").onclick = restaurarRespaldo;
  $("#aviso-ocultar").onclick = ()=> b.remove();
}

let toastTimer;
function toast(msg){
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove("show"), 2200);
}

/* ============================================================
   ARRANQUE
   ============================================================ */
function init(){
  if(estado.nocheProfunda){ document.body.classList.add("deep"); $("#btn-deep").classList.add("active"); }
  renderHoy();
  avisoPersistencia();
}
init();
</script>

if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); });
}
</script>
