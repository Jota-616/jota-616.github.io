<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#14110C" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Stoa Nocturna" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="manifest" href="manifest.json" />
<title>Stoa Nocturna</title>
<style>
/* ============================================================
   STOA NOCTURNA — Fase 1
   App de lectura filosófica nocturna. Un solo archivo, sin
   dependencias, abre offline. Modo oscuro por defecto.
   Tokens de diseño (paleta del brief): fondo oscuro, dorado
   tenue, marfil, azul petróleo, cobre. Tipografía clásica.
   ============================================================ */

:root{
  /* --- Color --- */
  --bg:        #14110C;   /* tinta nocturna cálida (no negro puro) */
  --bg-top:    #1a1510;   /* degradado superior, tenue */
  --surface:   #1E1913;   /* panel */
  --surface-2: #261F16;   /* panel elevado / hover */
  --ivory:     #E9E0C8;   /* texto de lectura (marfil cálido) */
  --muted:     #9C8E74;   /* texto secundario */
  --faint:     #6F6450;   /* texto terciario / locked */
  --gold:      #C8A24B;   /* dorado tenue (acento principal) */
  --copper:    #B06A3C;   /* cobre (acento cálido) */
  --petroleo:  #2C4F4C;   /* azul petróleo (paneles fríos) */
  --petroleo-2:#3A6360;
  --line:      rgba(200,162,75,0.18); /* hairline dorado */
  --line-soft: rgba(236,227,208,0.08);

  /* --- Tipografía --- */
  --serif-display: "Palatino Linotype","Book Antiqua",Palatino,"URW Palladio L",Georgia,serif;
  --serif-body: Georgia,"Times New Roman",Times,serif;
  --sans-ui: ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;

  --maxw: 680px;
}

*{ box-sizing:border-box; margin:0; padding:0; }

html,body{ height:100%; }

body{
  font-family: var(--serif-body);
  color: var(--ivory);
  background:
    radial-gradient(120% 60% at 50% -10%, var(--bg-top) 0%, var(--bg) 55%) fixed,
    var(--bg);
  line-height:1.7;
  font-size:17px;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  padding-bottom: calc(180px + env(safe-area-inset-bottom)); /* espacio para nav inferior */
}

/* ---------- Cabecera ---------- */
.topbar{
  position:sticky; top:0; z-index:20;
  display:flex; align-items:center; justify-content:space-between;
  gap:10px;
  padding:14px 18px calc(14px) 18px;
  padding-top: calc(14px + env(safe-area-inset-top));
  background: linear-gradient(180deg, rgba(20,17,12,0.96), rgba(20,17,12,0.72) 70%, rgba(20,17,12,0));
  backdrop-filter: blur(4px);
}
.brand{ display:flex; align-items:center; gap:10px; }
.brand .flame{ width:22px; height:22px; flex:none; }
.brand h1{
  font-family:var(--serif-display);
  font-weight:600; font-size:1.18rem; letter-spacing:0.5px;
  color:var(--ivory);
}
.brand small{ display:block; font-family:var(--sans-ui); font-size:0.6rem; letter-spacing:2.5px; text-transform:uppercase; color:var(--gold); font-weight:600; }
.topbar-actions{ display:flex; gap:8px; }
.icon-btn{
  font-family:var(--sans-ui);
  background:var(--surface); color:var(--muted);
  border:1px solid var(--line); border-radius:999px;
  padding:7px 12px; font-size:0.72rem; letter-spacing:0.5px;
  cursor:pointer; transition: color .2s, border-color .2s, background .2s;
}
.icon-btn:hover{ color:var(--ivory); border-color:var(--gold); }
.icon-btn.active{ color:var(--bg); background:var(--gold); border-color:var(--gold); }

/* ---------- Contenedor de vistas ---------- */
main{ max-width:var(--maxw); margin:0 auto; padding:8px 18px 40px; }
.view{ display:none; }
.view.active{ display:block; animation: rise .35s ease both; }
@keyframes rise{ from{ opacity:0; transform: translateY(8px);} to{ opacity:1; transform:none; } }

/* ---------- Ornamento divisor (diamante griego) ---------- */
.divider{
  display:flex; align-items:center; gap:14px;
  margin:26px 0; color:var(--gold);
}
.divider::before,.divider::after{ content:""; height:1px; flex:1; background:var(--line); }
.divider span{ font-size:0.7rem; opacity:0.8; }

/* ---------- Tarjeta de lectura (elemento firma: luz de lámpara) ---------- */
.lesson-wrap{ position:relative; }
.lesson-wrap::before{
  content:""; position:absolute; left:50%; top:-30px; transform:translateX(-50%);
  width:min(560px,90%); height:340px; pointer-events:none; z-index:0;
  background: radial-gradient(closest-side, rgba(200,162,75,0.14), rgba(176,106,60,0.05) 55%, transparent 75%);
  filter: blur(6px);
}
.lesson{ position:relative; z-index:1; }

.eyebrow{
  font-family:var(--sans-ui); font-size:0.64rem; letter-spacing:3px;
  text-transform:uppercase; color:var(--gold); font-weight:700;
  display:flex; gap:10px; flex-wrap:wrap; align-items:center;
}
.eyebrow .dot{ width:3px; height:3px; border-radius:50%; background:var(--copper); }

h2.lesson-title{
  font-family:var(--serif-display); font-weight:600;
  font-size: clamp(1.7rem, 6vw, 2.3rem); line-height:1.2;
  margin:10px 0 6px; color:var(--ivory);
}
.meta-line{ font-family:var(--sans-ui); font-size:0.74rem; color:var(--muted); letter-spacing:0.4px; }

.section{ margin-top:24px; }
.section h3{
  font-family:var(--sans-ui); font-size:0.66rem; letter-spacing:2.5px;
  text-transform:uppercase; color:var(--copper); font-weight:700; margin-bottom:7px;
}
.section p{ color:var(--ivory); }
.section p.lead{ font-size:1.12rem; font-style:italic; color:#F5EFDD; }

/* Bloque cita / frase para recordar */
.quote{
  margin-top:26px; padding:20px 22px; border-radius:12px;
  background: linear-gradient(180deg, var(--surface-2), var(--surface));
  border:1px solid var(--line); position:relative;
}
.quote .q-text{ font-family:var(--serif-display); font-size:1.2rem; font-style:italic; color:#F5EFDD; line-height:1.45; }
.quote .q-src{ margin-top:10px; font-family:var(--sans-ui); font-size:0.74rem; color:var(--gold); letter-spacing:0.4px; }
.tag-src{ display:inline-block; margin-left:8px; font-size:0.6rem; text-transform:uppercase; letter-spacing:1.5px;
  padding:2px 7px; border-radius:999px; border:1px solid var(--line); color:var(--muted); }
.tag-src.parafrasis{ color:var(--copper); border-color:rgba(176,106,60,0.4); }
.tag-src.traduccion{ color:var(--petroleo-2); border-color:rgba(58,99,96,0.5); }
.tag-src.cita{ color:var(--gold); }

/* Pregunta incómoda */
.uncomfortable{
  margin-top:22px; padding:16px 18px; border-left:3px solid var(--copper);
  background:rgba(176,106,60,0.07); border-radius:0 10px 10px 0;
}
.uncomfortable h3{ color:var(--copper); }
.uncomfortable p{ font-style:italic; }

/* Práctica nocturna */
.practice{
  margin-top:22px; padding:16px 18px; border-radius:10px;
  background:rgba(44,79,76,0.18); border:1px solid rgba(58,99,96,0.35);
}
.practice h3{ color:var(--petroleo-2); }

/* Conversaciones */
.charla{
  margin-top:14px; padding:14px 16px; border-radius:10px; background:var(--surface);
  border:1px solid var(--line-soft);
}
.charla .nivel{ font-family:var(--sans-ui); font-size:0.6rem; letter-spacing:2px; text-transform:uppercase; color:var(--gold); font-weight:700; }
.charla .tema{ font-family:var(--serif-display); font-size:1.05rem; margin:4px 0 8px; color:var(--ivory); }
.charla .row{ font-size:0.92rem; color:var(--muted); margin-top:4px; }
.charla .row b{ color:var(--ivory); font-weight:600; font-family:var(--sans-ui); font-size:0.7rem; letter-spacing:1px; text-transform:uppercase; }

/* Botonera principal */
.actions{ display:flex; gap:10px; margin-top:30px; margin-bottom:28px; flex-wrap:wrap; }
.btn{
  font-family:var(--sans-ui); font-weight:600; font-size:0.85rem; letter-spacing:0.3px;
  border:none; border-radius:10px; padding:13px 18px; cursor:pointer;
  transition: transform .12s, filter .2s, background .2s, color .2s; flex:1; min-width:140px;
}
.btn:active{ transform: scale(0.98); }
.btn-primary{ background: linear-gradient(180deg, var(--gold), var(--copper)); color:#1b140b; }
.btn-primary:hover{ filter:brightness(1.07); }
.btn-primary.done{ background:var(--surface-2); color:var(--gold); border:1px solid var(--gold); }
.btn-ghost{ background:var(--surface); color:var(--ivory); border:1px solid var(--line); }
.btn-ghost:hover{ border-color:var(--gold); }

/* ---------- Camino / rutas ---------- */
.route-head{ margin:6px 0 18px; }
.route-head h2{ font-family:var(--serif-display); font-size:1.5rem; font-weight:600; }
.route-head p{ color:var(--muted); font-size:0.95rem; }

.chips{ display:flex; gap:8px; overflow-x:auto; padding:4px 0 14px; -webkit-overflow-scrolling:touch; }
.chip{
  font-family:var(--sans-ui); font-size:0.72rem; white-space:nowrap;
  padding:7px 13px; border-radius:999px; border:1px solid var(--line);
  color:var(--muted); background:transparent; cursor:pointer;
}
.chip.active{ background:var(--gold); color:var(--bg); border-color:var(--gold); }

.path{ list-style:none; position:relative; padding-left:30px; }
.path::before{ content:""; position:absolute; left:9px; top:8px; bottom:8px; width:2px; background:var(--line); }
.path li{ position:relative; margin-bottom:14px; }
.path li .node{
  position:absolute; left:-30px; top:14px; width:20px; height:20px; border-radius:50%;
  background:var(--bg); border:2px solid var(--faint); display:flex; align-items:center; justify-content:center;
  font-size:0.6rem; color:var(--faint);
}
.path li.read .node{ border-color:var(--gold); color:var(--gold); }
.path li.available .node{ border-color:var(--copper); color:var(--copper); }
.day-card{
  width:100%; text-align:left; cursor:pointer; background:var(--surface);
  border:1px solid var(--line-soft); border-radius:12px; padding:14px 16px; color:inherit; font:inherit;
  transition:border-color .2s, background .2s;
}
.day-card:hover{ border-color:var(--gold); background:var(--surface-2); }
.day-card.locked{ cursor:not-allowed; opacity:0.55; }
.day-card .dc-day{ font-family:var(--sans-ui); font-size:0.62rem; letter-spacing:2px; text-transform:uppercase; color:var(--gold); }
.day-card .dc-title{ font-family:var(--serif-display); font-size:1.1rem; margin-top:2px; }
.day-card .dc-sub{ font-size:0.8rem; color:var(--muted); margin-top:3px; }

/* ---------- Biblioteca ---------- */
.lib-grid{ display:grid; gap:12px; }
.ficha{
  background:var(--surface); border:1px solid var(--line-soft); border-radius:12px;
  padding:16px 18px; cursor:pointer; transition:border-color .2s;
}
.ficha:hover{ border-color:var(--gold); }
.ficha summary{ list-style:none; cursor:pointer; }
.ficha summary::-webkit-details-marker{ display:none; }
.ficha .f-name{ font-family:var(--serif-display); font-size:1.18rem; color:var(--ivory); }
.ficha .f-life{ font-family:var(--sans-ui); font-size:0.68rem; color:var(--gold); letter-spacing:1px; }
.ficha .f-body{ margin-top:12px; }
.ficha .f-body .fb{ margin-top:10px; }
.ficha .f-body .fb b{ font-family:var(--sans-ui); font-size:0.62rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--copper); display:block; margin-bottom:2px; }
.ficha .f-body .fb span{ color:var(--ivory); font-size:0.95rem; }

/* ---------- Diario ---------- */
.journal-q{ margin-bottom:16px; }
.journal-q label{ display:block; font-family:var(--serif-display); font-size:1.02rem; color:var(--ivory); margin-bottom:6px; }
.journal-q textarea{
  width:100%; min-height:70px; resize:vertical; border-radius:10px;
  background:var(--surface); border:1px solid var(--line); color:var(--ivory);
  font-family:var(--serif-body); font-size:1rem; padding:11px 13px; line-height:1.6;
}
.journal-q textarea:focus{ outline:none; border-color:var(--gold); }
.saved-note{ font-family:var(--sans-ui); font-size:0.74rem; color:var(--petroleo-2); margin-top:4px; min-height:1em; }

/* ---------- Sello / progreso (RPG sobrio) ---------- */
.seal-card{
  text-align:center; padding:26px 20px; border-radius:16px; margin-bottom:18px;
  background: radial-gradient(120% 120% at 50% 0%, var(--surface-2), var(--surface));
  border:1px solid var(--line);
}
.seal-emblem{ width:70px; height:70px; margin:0 auto 12px; }
.seal-rank{ font-family:var(--serif-display); font-size:1.5rem; color:var(--gold); }
.seal-xp{ font-family:var(--sans-ui); font-size:0.8rem; color:var(--muted); margin-top:4px; letter-spacing:0.4px; }
.xp-bar{ height:7px; border-radius:999px; background:var(--surface-2); margin:14px auto 6px; max-width:300px; overflow:hidden; border:1px solid var(--line-soft); }
.xp-bar i{ display:block; height:100%; background:linear-gradient(90deg,var(--copper),var(--gold)); width:0; transition:width .6s; }
.next-rank{ font-family:var(--sans-ui); font-size:0.7rem; color:var(--faint); letter-spacing:0.5px; }

.stats-row{ display:flex; gap:10px; margin-bottom:20px; }
.stat{ flex:1; background:var(--surface); border:1px solid var(--line-soft); border-radius:12px; padding:14px; text-align:center; }
.stat .n{ font-family:var(--serif-display); font-size:1.6rem; color:var(--ivory); }
.stat .l{ font-family:var(--sans-ui); font-size:0.6rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-top:2px; }

.subhead{ font-family:var(--sans-ui); font-size:0.66rem; letter-spacing:2.5px; text-transform:uppercase; color:var(--gold); font-weight:700; margin:24px 0 12px; }

.badge-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; }
.badge{ background:var(--surface); border:1px solid var(--line-soft); border-radius:12px; padding:14px; text-align:center; opacity:0.4; }
.badge.earned{ opacity:1; border-color:var(--line); }
.badge .b-ico{ font-size:1.4rem; }
.badge .b-name{ font-family:var(--serif-display); font-size:0.95rem; margin-top:4px; color:var(--ivory); }
.badge .b-desc{ font-family:var(--sans-ui); font-size:0.66rem; color:var(--muted); margin-top:2px; }

.virtue-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.virtue{ background:rgba(44,79,76,0.14); border:1px solid rgba(58,99,96,0.3); border-radius:12px; padding:14px; }
.virtue .v-name{ font-family:var(--serif-display); font-size:1.05rem; color:var(--petroleo-2); }
.virtue .v-task{ font-size:0.88rem; color:var(--ivory); margin-top:5px; }

/* Aviso de cuidado intelectual */
.caution{
  margin:26px 0 0; padding:18px 20px; border-radius:12px;
  background:rgba(176,106,60,0.08); border:1px dashed rgba(176,106,60,0.4);
}
.caution h3{ font-family:var(--sans-ui); font-size:0.66rem; letter-spacing:2px; text-transform:uppercase; color:var(--copper); margin-bottom:8px; }
.caution ul{ list-style:none; }
.caution li{ font-size:0.92rem; color:var(--ivory); padding:3px 0 3px 18px; position:relative; }
.caution li::before{ content:"✕"; position:absolute; left:0; color:var(--copper); font-size:0.8rem; }
.caution .is{ margin-top:10px; font-style:italic; color:var(--gold); }

/* ---------- Nav inferior ---------- */
.bottom-nav{
  position:fixed; bottom:0; left:0; right:0; z-index:30;
  display:flex; justify-content:space-around;
  background: linear-gradient(0deg, var(--bg) 60%, rgba(20,17,12,0.85));
  border-top:1px solid var(--line);
  padding:8px 6px calc(8px + env(safe-area-inset-bottom));
  backdrop-filter: blur(8px);
}
.nav-btn{
  background:none; border:none; cursor:pointer; flex:1;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  color:var(--faint); font-family:var(--sans-ui); font-size:0.6rem; letter-spacing:0.6px;
  padding:4px 0; transition:color .2s;
}
.nav-btn svg{ width:22px; height:22px; }
.nav-btn.active{ color:var(--gold); }

/* Modo noche profunda: oculta secciones largas */
body.deep .deep-hide{ display:none; }
body.deep .lesson-title{ margin-bottom:14px; }

/* Toast */
.toast{
  position:fixed; left:50%; bottom:96px; transform:translateX(-50%) translateY(20px);
  background:var(--surface-2); color:var(--ivory); border:1px solid var(--gold);
  padding:11px 18px; border-radius:999px; font-family:var(--sans-ui); font-size:0.82rem;
  opacity:0; pointer-events:none; transition:opacity .3s, transform .3s; z-index:50; max-width:90%;
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

@media (prefers-reduced-motion: reduce){
  *{ animation:none !important; transition:none !important; }
}
@media (min-width:560px){
  .virtue-grid{ grid-template-columns:repeat(4,1fr); }
}
</style>
</head>
<body>

<!-- ============ CABECERA ============ -->
<header class="topbar">
  <div class="brand">
    <svg class="flame" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M12 2c2.5 3 1 5.5-0.5 7.5C10 11.5 9 13 9.5 15c-1.5-1-2-2.5-2-2.5C6 14 6 16 6.5 17.5 7.5 20.5 9.6 22 12 22s4.5-1.5 5.5-4.5c1.2-3.6-1-7-2.5-9 .3 2-0.7 3-1.8 3.6 .8-3.4-0.6-6.6-1.2-8.1z"
        fill="#C8A24B" stroke="#B06A3C" stroke-width="0.4"/>
    </svg>
    <div>
      <small>Stoa</small>
      <h1>Stoa Nocturna</h1>
    </div>
  </div>
  <div class="topbar-actions">
    <button class="icon-btn" id="btn-random" title="Lección aleatoria">Azar</button>
    <button class="icon-btn" id="btn-deep" title="Modo noche profunda">Noche profunda</button>
  </div>
</header>

<main>
  <!-- ===== VISTA: HOY ===== -->
  <section class="view active" id="view-hoy"></section>

  <!-- ===== VISTA: CAMINO ===== -->
  <section class="view" id="view-camino"></section>

  <!-- ===== VISTA: BIBLIOTECA ===== -->
  <section class="view" id="view-biblioteca"></section>

  <!-- ===== VISTA: DIARIO ===== -->
  <section class="view" id="view-diario"></section>

  <!-- ===== VISTA: SELLO ===== -->
  <section class="view" id="view-sello"></section>
</main>

<!-- ============ NAV INFERIOR ============ -->
<nav class="bottom-nav">
  <button class="nav-btn active" data-view="hoy">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3l8 6v11H4V9z"/><path d="M9 20v-6h6v6"/></svg>
    Hoy
  </button>
  <button class="nav-btn" data-view="camino">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 19c4 0 4-6 8-6s4-6 6-6"/><circle cx="5" cy="19" r="1.6"/><circle cx="19" cy="7" r="1.6"/></svg>
    Camino
  </button>
  <button class="nav-btn" data-view="biblioteca">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 4h6v16H5zM13 4h6v16h-6z"/></svg>
    Biblioteca
  </button>
  <button class="nav-btn" data-view="diario">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 3h9l4 4v14H6z"/><path d="M9 12h7M9 16h7"/></svg>
    Diario
  </button>
  <button class="nav-btn" data-view="sello">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="9" r="5"/><path d="M8 13l-1 8 5-3 5 3-1-8"/></svg>
    Sello
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   DATOS
   ============================================================ */

/* Temas para filtro */
const TEMAS = ["control","disciplina","virtud","miedo","muerte","familia","liderazgo","deseo","rabia"];

/* Rutas (camino de aprendizaje) — sólo Ruta 1 poblada en Fase 1 */
const RUTAS = [
  { id:1, nombre:"Fundamentos del estoicismo", desc:"Las cuatro ideas que sostienen todo lo demás." },
  { id:2, nombre:"Control, deseo, miedo y disciplina", desc:"Próximamente." },
  { id:3, nombre:"Virtud, carácter y liderazgo", desc:"Próximamente." },
  { id:4, nombre:"Amor, familia, pérdida y muerte", desc:"Próximamente." },
  { id:5, nombre:"Filosofía comparada", desc:"Próximamente." },
  { id:6, nombre:"Vida moderna y estoicismo aplicado", desc:"Próximamente." }
];

/* Rangos (RPG sobrio) — umbral de XP */
const RANGOS = [
  { nombre:"Aprendiz de la Stoa", xp:0 },

  desarrollo:`Esto no niega el dolor real; niega que sea automático e incuestionable. Entre "me ignoró en la reunión" y "me siento humillado" hay un juicio intermedio: "esto significa que me desprecia". Y ese juicio puede ser falso, exagerado o prematuro. El trabajo estoico es atrapar ese juicio antes de que se vuelva emoción y preguntarle: ¿es verdad?, ¿es seguro?, ¿es la única lectura posible?`,

  entrada:`La mayoría de tus desgracias no han ocurrido. Viven en tu cabeza, ensayando.`,
  contexto:`Lucio Anneo Séneca (hacia 4 a.C.–65 d.C.) fue cordobés, dramaturgo, tutor y luego consejero del emperador Nerón. En sus "Cartas a Lucilio", la número 13 desmonta un mecanismo muy humano: anticipar males que quizá nunca lleguen.`,
  ideaCentral:`Buena parte del miedo no responde a un peligro presente, sino a uno imaginado y futuro. Sufrimos por adelantado, y muchas veces por cosas que no van a suceder.`,
  desarrollo:`Séneca no dice "no te prepares". Dice: distingue el peligro real del peligro ensayado. La preocupación útil termina en una acción; la inútil sólo gira en círculos. Cuando una inquietud no te lleva a hacer nada distinto, ya no te protege: sólo te desgasta. La pregunta que corta el nudo es simple: esto que temo, ¿está pasando ahora, o lo estoy ensayando?`,
  ejemplo:`Tienes un examen médico de rutina. Una semana antes ya enterraste, en tu mente, varios escenarios catastróficos. Llega el resultado: normal. Sufriste una enfermedad entera que nunca tuviste.`,
  aplicacion:`Cuando te sorprendas temiendo, pregúntate: "¿esto está ocurriendo ahora?". Si no, vuelve al presente con una acción concreta y pequeña. Si la preocupación no produce ninguna acción, es ficción.`,
  contraste:`El epicúreo trata el miedo desactivando deseos y evitando lo que altera; Séneca, estoico, no huye: mira el miedo de frente, lo nombra y lo desarma con razón. Un crítico diría que algo de anticipación es sano (prevención). Cierto: la clave es que termine en preparación, no en rumiación.`,

  entrada:`Los estoicos resumieron la buena vida en una frase incómoda de traducir: vivir conforme a la naturaleza. No es abrazar árboles; es vivir según la razón.`,
  contexto:`Zenón de Citio (hacia 334–262 a.C.) era un comerciante fenicio que naufragó cerca de Atenas y se quedó a filosofar. Enseñaba en la Stoa Poikílē —el "pórtico pintado"—, de donde el estoicismo toma su nombre. Su obra se perdió casi entera; lo conocemos por testimonios posteriores, sobre todo de Diógenes Laercio.`,
  ideaCentral:`El fin de la vida, para los estoicos, es vivir de acuerdo con la naturaleza. Y la naturaleza propia del ser humano es la razón. Vivir bien es, entonces, vivir conforme a la razón: con virtud.`,
  desarrollo:`"Naturaleza" aquí tiene dos caras: el orden del cosmos (que no controlas) y tu naturaleza racional y social (que sí puedes cultivar). Vivir conforme a la naturaleza es alinear tus actos con lo que la razón ve como correcto, en vez de con el impulso, el miedo o la opinión ajena. De ahí salen las cuatro virtudes cardinales: sabiduría, justicia, coraje y templanza. No son adornos morales: son el "cómo" de una vida que funciona.`,
  ejemplo:`Te ofrecen un atajo que te conviene pero perjudica a un colega. El impulso dice "tómalo". La razón —tu naturaleza más alta— pregunta qué clase de persona eliges ser. Vivir conforme a la naturaleza es dejar que esa segunda voz decida.`,
  aplicacion:`Hoy, ante una decisión, pregúntate cuál de las cuatro virtudes está en juego —sabiduría, justicia, coraje o templanza— y actúa desde ahí, no desde el impulso.`,
  contraste:`Para Aristóteles la buena vida (eudaimonía) también es virtud, pero necesita además ciertos bienes externos: salud, amigos, algo de fortuna. El estoico es más radical: la virtud basta para una buena vida; lo demás es preferible, no necesario. Ahí discuten dos gigantes, y vale la pena escuchar a ambos.`,
  practica:`Elige una sola de las cuatro virtudes para mañana. Sólo una. Decídela esta noche y ponle un acto concreto.`,

  preguntaIncomoda:`Si dijeras que la virtud te basta, ¿lo vives, o sólo lo dices?`,

  entrada:`Nada ordena tanto las prioridades como recordar, sin drama, que esto se acaba. La muerte no está para asustarte: está para despertarte.`,
  contexto:`Marco Aurelio (121–180 d.C.) fue emperador de Roma y, en privado, estoico. Sus "Meditaciones" no eran un libro para publicar: eran notas personales escritas para sí mismo, muchas en plena campaña militar. Vuelve una y otra vez sobre la brevedad de la vida, no por morbo, sino para vivirla mejor.`,
  ideaCentral:`Tener presente la muerte —memento mori— no es un pensamiento sombrío, sino una brújula: si el tiempo es finito y no sabes cuánto te queda, ¿en qué y con quién lo gastas?`,
  desarrollo:`La muerte, bien usada, recorta lo trivial. Las rencillas, el qué dirán, la acumulación sin sentido se encogen cuando recuerdas que el plazo es real. No se trata de vivir asustado, sino despierto: hacer ahora lo que importa, decir lo que hay que decir, tratar bien a quien tienes al lado. Paradójicamente, pensar en la muerte vuelve la vida más viva.`,
  ejemplo:`Postergas una conversación pendiente con tu padre "para cuando haya tiempo". Memento mori te recuerda que el tiempo no está garantizado para nadie. Llamas hoy.`,
  aplicacion:`Hoy, toma una sola decisión a la luz de esta pregunta: "si supiera que el tiempo es corto, ¿haría esto, o haría otra cosa?". Y hazla.`,
  contraste:`El epicúreo también medita sobre la muerte, pero para quitarle el miedo ("donde está la muerte no estamos nosotros"). El estoico la usa distinto: no sólo para no temerla, sino para ordenar la vida que aún tiene. Dos formas sabias de mirar lo mismo.`,

  contexto:`Séneca, en "De la tranquilidad del alma", describe cómo el sabio emprende sus planes. No le promete resultados al destino: actúa con una reserva mental —"haré esto, si nada lo impide"— para no romperse cuando algo falla.`,
  ideaCentral:`Comprométete con la acción, no con el desenlace. Persigue tus metas con todo, pero añade en silencio: "si las circunstancias lo permiten". Así la frustración no te derriba: ya habías contado con que el mundo no obedece.`,
  desarrollo:`No es tibieza ni falta de ambición; es blindaje. Quien jura que "esto saldrá sí o sí" entrega su paz a factores que no controla. Quien actúa con reserva conserva la intensidad y, a la vez, la flexibilidad: si el camino se cierra, no se hunde, se reorienta. La reserva separa tu esfuerzo —tuyo— del resultado —del mundo—.`,
  ejemplo:`Organizas un asado familiar con semanas de ilusión y llueve. Sin reserva, el día se arruina y tú con él. Con reserva, ya sabías que el clima no era tuyo: cambias el plan, no el ánimo.`,

  contraste:`Un crítico moderno dirá que sin certeza no hay motivación fuerte. El estoico responde: la motivación sana no nace de la certeza del premio, sino del valor de actuar bien. Quien sólo se mueve con garantías, se paraliza apenas el mundo duda.`,

{
  dia:7, ruta:1, titulo:"Querer lo que sucede",
  escuela:"Estoicismo romano · Epicteto", duracion:"5–8 min", temas:["control","deseo"],
  entrada:`Hay dos formas de pelear con la realidad: exigir que cambie, o cambiar tu relación con ella. Una agota; la otra libera.`,
  contexto:`Epicteto, en el "Enquiridión", capítulo 8, ofrece una de las frases más radicales del estoicismo: no pidas que las cosas pasen como quieres, sino quiere que pasen como pasan. Siglos después, Nietzsche llamaría a algo parecido "amor fati": amar el propio destino.`,
  ideaCentral:`La serenidad no llega cuando el mundo se ajusta a tus deseos, sino cuando tus deseos dejan de exigirle al mundo lo imposible. Querer lo que ya sucede corta de raíz la lucha estéril contra los hechos.`,
  desarrollo:`Esto no es conformismo: lo que ya ocurrió es inamovible, y pelearse con un hecho consumado es perder dos veces. Aceptar lo sucedido no significa aprobarlo ni dejar de actuar hacia adelante; significa dejar de gastar fuerza negando lo que es, para invertirla en lo que sigue. Primero aceptas el terreno; después decides el paso.`,
  ejemplo:`Pierdes un vuelo por un accidente en la ruta. Puedes pasar horas furioso reescribiendo un pasado que no volverá, o aceptar el hecho y resolver el siguiente vuelo. El enojo no recupera el avión; sólo arruina la espera.`,
  aplicacion:`Hoy, ante algo ya ocurrido que te moleste, repite para ti: "esto ya es así". Luego pregunta sólo: "¿cuál es mi siguiente paso?".`,
  contraste:`El crítico teme que aceptar lo que pasa apague la rebeldía justa. Pero el estoico distingue: ante el pasado consumado, aceptación; ante el futuro abierto, acción. Frankl, desde un campo de concentración, mostró que aceptar lo inevitable y conservar la dignidad no se contradicen.`,
  practica:`Recuerda un hecho de hoy que te costó aceptar. Dile en silencio "así fue" y suéltalo, sin agregarle reproche.`,
  conversar:`¿Aceptar lo que pasó es sabiduría o resignación disfrazada?`,
  preguntaIncomoda:`¿Cuánta energía gastaste hoy discutiendo con hechos que ya no podías cambiar?`,
  frase:{ texto:`No pidas que las cosas sucedan como quieres, sino quiere que sucedan como suceden.`, autor:"Epicteto", obra:"Enquiridión, 8", tipo:"traduccion" },
  charlas:[
    { nivel:"Simple",  tema:"¿Aceptar es lo mismo que rendirse?", postura:"Aceptas el pasado, no el futuro.", contra:"A veces no aceptar es lo que impulsa el cambio.", pregunta:"¿Se puede aceptar un hecho sin aprobarlo?" },
    { nivel:"Profundo",tema:"¿'Amar el destino' es posible cuando duele?", postura:"No amas el dolor, amas seguir entero dentro de él.", contra:"Hay tragedias imposibles de amar.", pregunta:"¿Dónde está el límite entre aceptación y autoengaño?" },
    { nivel:"Filoso",  tema:"Si quieres lo que sucede, ¿puede algo decepcionarte?", postura:"La decepción nace de exigirle al mundo un guion.", contra:"Sin expectativas, ¿no se apaga el deseo?", pregunta:"¿Se puede querer sin exigir?" }
  ]
},
{
  dia:8, ruta:1, titulo:"La vista desde lo alto",
  escuela:"Estoicismo romano · Marco Aurelio", duracion:"5–8 min", temas:["control","virtud"],
  entrada:`Casi todo lo que hoy te parece enorme se encoge si lo miras desde suficiente altura.`,
  contexto:`Marco Aurelio practicaba en sus "Meditaciones" un ejercicio que el filósofo Pierre Hadot llamó "la vista desde lo alto": imaginarse contemplando la Tierra y los asuntos humanos como desde el cielo, para devolverles su tamaño real.`,
  ideaCentral:`Cambiar la escala cambia la emoción. Visto de cerca, un conflicto ocupa todo tu cielo; visto desde arriba —en el mapa de tu vida, de la ciudad, del tiempo— recupera su proporción. La perspectiva no niega el problema: lo dimensiona.`,
  desarrollo:`No es minimizar lo que importa, es dejar de inflar lo que no. Muchas rabias y angustias viven de un primer plano excesivo: la discusión de hoy, el comentario de alguien, el atasco. Subir la cámara —¿esto importará en un mes?, ¿en cinco años?— no borra el asunto, pero le quita el poder de secuestrarte el día.`,
  ejemplo:`Te obsesiona un comentario crítico en una reunión. Imagínalo dentro del conjunto de tu año, de tu trabajo, de tu vida entera. Sigue ahí, pero ya no llena toda la pantalla.`,
  aplicacion:`Hoy, ante algo que te abrume, hazte una sola pregunta de escala: "¿qué tamaño tiene esto en el mapa completo de mi vida?".`,
  contraste:`El crítico advierte que "todo es pequeño desde lejos" puede volverse indiferencia o evasión. Cierto: la vista desde lo alto es para recuperar proporción, no para despreciar lo humano. Bien usada, no enfría el corazón; lo ordena.`,
  practica:`Antes de dormir, imagina tu día visto desde muy arriba: tu casa, tu ciudad, tu punto en el mapa. Observa cuánto de lo que te pesó cabe en ese paisaje.`,
  conversar:`¿Qué problema que hoy te quita el sueño te dará risa —o ni recordarás— en diez años?`,
  preguntaIncomoda:`¿Cuánto de tu drama de hoy es importancia real, y cuánto es falta de perspectiva?`,
  frase:{ texto:`Contempla desde lo alto los rebaños incontables de los hombres y su agitación.`, autor:"Marco Aurelio", obra:"Meditaciones, IX, 30", tipo:"parafrasis" },
  charlas:[
    { nivel:"Simple",  tema:"¿Sirve pensar 'esto no importará en un año'?", postura:"Devuelve proporción al problema.", contra:"Algunas cosas importan justo porque son pequeñas y diarias.", pregunta:"¿Todo lo grande de hoy será pequeño mañana?" },
    { nivel:"Profundo",tema:"¿La perspectiva consuela o anestesia?", postura:"Ordena la emoción sin negar el hecho.", contra:"Puede ser excusa para no implicarse.", pregunta:"¿Cómo distingues serenidad de indiferencia?" },
    { nivel:"Filoso",  tema:"Si todo es minúsculo en el cosmos, ¿algo importa?", postura:"Importa a tu escala humana, que es la que vives.", contra:"Entonces la perspectiva cósmica es un truco.", pregunta:"¿Puede algo ser insignificante y valioso a la vez?" }
  ]
},
{
  dia:9, ruta:1, titulo:"Ensayar la adversidad",
  escuela:"Estoicismo romano · Séneca", duracion:"5–8 min", temas:["miedo","disciplina"],
  entrada:`La noche 3 vimos el miedo inútil que sólo gira. Hoy, su opuesto: un miedo ensayado a propósito, que en vez de paralizar, prepara.`,
  contexto:`Los estoicos practicaban la "premeditatio malorum": imaginar con calma las dificultades posibles antes de que lleguen. Séneca lo recomienda en sus cartas: enviar la mente por delante a encontrarse con los problemas, para que ninguno nos tome desarmados.`,
  ideaCentral:`Anticipar la adversidad —deliberadamente, no por ansiedad— le quita su filo. Lo que ya ensayaste no te sorprende; lo que ya pensaste, no te derriba igual. La sorpresa duele más que el golpe.`,
  desarrollo:`La diferencia con la preocupación tóxica está en la intención y el final. La rumiación es involuntaria, circular y termina en angustia; la premeditación es voluntaria, breve y termina en preparación o en paz: "si pasara, ya sé cómo respondería". Una te encierra en el problema; la otra te entrena para él y te devuelve al presente.`,
  ejemplo:`Antes de una negociación importante, dedicas cinco minutos a imaginar el peor escenario: que digan que no. Lo piensas con calma y planeas tu respuesta. Llegas más sereno, porque el "no" ya no es un fantasma: es una posibilidad prevista.`,
  aplicacion:`Hoy, ante algo que te inquiete, dedícale cinco minutos controlados: ¿qué es lo peor que podría pasar y qué haría yo si pasara? Luego ciérralo y vuelve al presente.`,
  contraste:`El epicúreo prefería no anticipar males para no sufrirlos dos veces. El estoico responde: el sufrimiento doble viene de la rumiación, no de la preparación lúcida. Bien hecha, la premeditación no añade miedo: lo descarga.`,
  practica:`Esta noche, elige una preocupación y pregúntate con calma: "si ocurriera lo peor, ¿seguiría siendo capaz de actuar con dignidad?". Suele ser que sí.`,
  conversar:`¿Prepararse para lo peor te da calma o te lo atrae?`,
  preguntaIncomoda:`¿Distingues de verdad cuándo te estás preparando y cuándo sólo estás sufriendo por adelantado?`,
  frase:{ texto:`Nada debería tomarnos por sorpresa; enviemos el alma por delante al encuentro de cuanto puede ocurrir.`, autor:"Séneca", obra:"Cartas a Lucilio, 91", tipo:"parafrasis" },
  charlas:[
    { nivel:"Simple",  tema:"¿Pensar en lo peor no atrae la mala suerte?", postura:"Prepararse no causa el evento; lo amortigua.", contra:"A algunos sólo les aumenta la ansiedad.", pregunta:"¿Cuándo prever ayuda y cuándo enferma?" },
    { nivel:"Profundo",tema:"¿Por qué duele más la sorpresa que el golpe esperado?", postura:"Lo previsto ya tiene un lugar en la mente.", contra:"Hay golpes que no se atenúan por preverlos.", pregunta:"¿Toda adversidad se ablanda al ensayarla?" },
    { nivel:"Filoso",  tema:"¿Se puede temer con serenidad?", postura:"Sí: mirar el peligro de frente, sin huir ni temblar.", contra:"El miedo, por definición, agita.", pregunta:"¿Es el coraje ausencia de miedo o dominio del miedo?" }
  ]
},
{
  dia:10, ruta:1, titulo:"Ampliar el círculo",
  escuela:"Estoicismo · Hierocles y Marco Aurelio", duracion:"5–8 min", temas:["virtud","familia","liderazgo"],
  entrada:`Eres parte de algo más grande que tú. Los estoicos lo decían sin sentimentalismo: lo que daña a la comunidad, te daña.`,
  contexto:`El estoico Hierocles (siglo II d.C.) describió nuestra pertenencia como círculos concéntricos: primero uno mismo, luego la familia, los cercanos, los conciudadanos, la humanidad entera. La tarea moral, decía, es ir acercando los círculos exteriores hacia el centro. Marco Aurelio lo resumía con una imagen: la abeja y la colmena.`,
  ideaCentral:`El ser humano es, por naturaleza, un animal social y racional. Vivir conforme a esa naturaleza incluye la justicia: tratar el bien de los demás como parte del propio. No por blandura, sino por coherencia.`,
  desarrollo:`El estoicismo mal entendido suena a individualismo de fortaleza interior. Es lo contrario: tu razón te hace parte de un todo, y aislarte de él es ir contra tu propia naturaleza. La virtud de la justicia —dar a cada uno lo suyo, cuidar lo común— no es un añadido moral, es parte de vivir bien. Quien sólo se cuida a sí mismo, se empobrece.`,
  ejemplo:`En el trabajo puedes optimizar sólo tu resultado, aunque hunda al equipo. Funciona a corto plazo. Pero la colmena que no prospera termina arrastrando a la abeja: el clima se pudre, la confianza se rompe, y tú dentro.`,
  aplicacion:`Hoy, en una decisión, pregúntate no sólo "¿qué me conviene?", sino "¿qué efecto tiene esto en los círculos a los que pertenezco?". Acerca un círculo exterior un poco más al centro.`,
  contraste:`Un crítico dirá que "el bien común" se ha usado para pedir sacrificios injustos al individuo. Verdad, y conviene cuidarlo. El estoico no anula a la persona en el grupo: dice que persona y comunidad bien entendidas no se oponen, se necesitan.`,
  practica:`Antes de dormir, piensa en alguien de un círculo lejano —un desconocido, un colega distante— y deséale sinceramente que le vaya bien. Nota qué se mueve.`,
  conversar:`¿Hasta qué círculo llega de verdad tu sentido de "los míos"?`,
  preguntaIncomoda:`¿Tu fortaleza interior es virtud, o a veces sólo una forma elegante de no comprometerte con nadie?`,
  frase:{ texto:`Lo que no conviene al enjambre, tampoco conviene a la abeja.`, autor:"Marco Aurelio", obra:"Meditaciones, VI, 54", tipo:"traduccion" },
  charlas:[
    { nivel:"Simple",  tema:"¿Ser estoico es ser solitario?", postura:"Al revés: la razón te hace social.", contra:"Mucho estoicismo popular suena a 'sólo yo'.", pregunta:"¿Se puede ser fuerte por dentro y entregado por fuera?" },
    { nivel:"Profundo",tema:"¿Por qué cuidar a quien no conozco?", postura:"Compartes con él la misma razón y la misma condición.", contra:"El instinto cuida primero a los cercanos.", pregunta:"¿Es ampliable el círculo, o tiene un límite natural?" },
    { nivel:"Filoso",  tema:"¿El bien del grupo justifica el sacrificio del individuo?", postura:"Persona y comunidad bien entendidas no se oponen.", contra:"La historia dice que muchas veces sí se opusieron.", pregunta:"¿Quién decide cuándo lo común pesa más que lo propio?" }
  ]
},
{
  dia:11, ruta:1, titulo:"Devolver, no perder",
  escuela:"Estoicismo romano · Epicteto", duracion:"5–8 min", temas:["deseo","muerte"],
  entrada:`Todo lo que tienes, en realidad, sólo lo tienes prestado. Cambia el verbo y cambia el duelo.`,
  contexto:`Epicteto, en el "Enquiridión" capítulo 11, propone un giro de lenguaje incómodo y poderoso: nunca digas "lo perdí", di "lo devolví". Tu trabajo, tus cosas, las personas que amas: nada de eso te pertenece en propiedad; te fue confiado por un tiempo.`,
  ideaCentral:`El sufrimiento ante la pérdida se alimenta de la ilusión de posesión. Si entiendes que todo es prestado, cada cosa se vive como un regalo mientras dura, y su partida deja de ser un robo para volverse una devolución.`,
  desarrollo:`No es frialdad ante lo que amas; es lucidez sobre su naturaleza. Amar algo sabiendo que es prestado no ama menos: ama mejor, porque no da por garantizado el mañana. El que cree poseer exige permanencia y se rompe cuando llega el cambio. El que sabe que cuida algo prestado agradece mientras lo tiene y lo suelta cuando toca.`,
  ejemplo:`Tus hijos crecen y un día se van. Vivido como pérdida, es un desgarro contra el que peleas. Vivido como devolución —los cuidaste, ahora siguen su camino—, sigue doliendo, pero es el dolor de una entrega cumplida, no de un fracaso.`,
  aplicacion:`Hoy, mira algo o alguien que aprecias y reformúlalo: "no es mío, lo tengo prestado". Nota cómo esa frase aumenta la gratitud y baja la angustia de perderlo.`,
  contraste:`El crítico teme que "todo es prestado" lleve a no apegarse a nada y vivir a media máquina. Pero la práctica estoica busca lo opuesto: apreciar más, precisamente porque nada está asegurado. La gratitud nace de la conciencia de lo frágil.`,
  practica:`Antes de dormir, agradece una sola cosa que hoy tuviste —una persona, tu salud, un momento— sabiendo que es prestada. Que el agradecimiento, no el miedo a perderla, sea lo último del día.`,
  conversar:`¿Amarías distinto si recordaras a diario que todo es prestado?`,
  preguntaIncomoda:`¿Cuánto de tu miedo a perder algo es amor, y cuánto es sólo apego a poseer?`,
  frase:{ texto:`Nunca digas de nada "lo he perdido", sino "lo he devuelto".`, autor:"Epicteto", obra:"Enquiridión, 11", tipo:"traduccion" },
  charlas:[
    { nivel:"Simple",  tema:"¿Pensar que todo es prestado entristece?", postura:"Más bien agradeces lo que aún tienes.", contra:"Recordar la pérdida puede amargar el presente.", pregunta:"¿Disfrutas más o menos sabiendo que algo se acabará?" },
    { nivel:"Profundo",tema:"¿Se puede amar sin apegarse?", postura:"Apego es exigir permanencia; amor es cuidar lo que es.", contra:"¿No es el apego parte natural del amor?", pregunta:"¿Dónde acaba amar y empieza poseer?" },
    { nivel:"Filoso",  tema:"Si nada es tuyo, ¿qué significa 'mío'?", postura:"'Mío' es lo que cuidas mientras dura, no lo que posees.", contra:"Entonces la propiedad es una ilusión útil.", pregunta:"¿Poseemos algo de verdad, o sólo lo administramos un rato?" }
  ]
},
{
  dia:12, ruta:1, titulo:"La ira, esa breve locura",
  escuela:"Estoicismo romano · Séneca", duracion:"5–8 min", temas:["rabia","control"],
  entrada:`De todas las pasiones, los estoicos temían especialmente una, porque se disfraza de justicia mientras destruye: la ira.`,
  contexto:`Séneca le dedicó un tratado entero, "De la ira". La describe como una locura pasajera que nubla la razón —el poeta Horacio ya había escrito que "la ira es una locura breve"— y advierte que, una vez desatada, no obedece. Por eso su remedio principal no es controlarla en el clímax, sino interceptarla antes.`,
  ideaCentral:`La ira no se domina en su punto máximo; se previene. El mejor remedio, decía Séneca, es la demora: ganar tiempo entre el estímulo y la reacción para que la razón vuelva a entrar en la sala.`,
  desarrollo:`La ira promete poder y entrega esclavitud: actúas dominado, dices lo que no piensas, rompes lo que costó años. Casi nunca arregla; casi siempre añade un problema nuevo —el de tu propia conducta— al que ya tenías. La demora no es tragarse todo: es no decidir en caliente. Lo que de verdad hay que decir, podrás decirlo igual mañana, y mejor dicho.`,
  ejemplo:`Lees un mensaje injusto y tu pulgar ya escribe la respuesta filosa. Si la envías, ganas diez segundos de desahogo y semanas de consecuencias. Si esperas a mañana, casi siempre escribes otra cosa —o nada—.`,
  aplicacion:`Hoy, cuando sientas que la rabia sube, impón una sola regla: no decidir ni responder de inmediato. Camina, respira, posterga. Que la razón llegue antes que el acto.`,
  contraste:`Aristóteles era más indulgente: la ira justa, en su justa medida, podía ser virtuosa. El estoico desconfía más: la ira engaña sobre su propia medida, casi siempre se cree justa. Entre los dos hay un debate antiguo que vale la pena tener.`,
  practica:`Recuerda un momento de hoy en que la rabia te empujó. Pregúntate: si hubiera esperado una hora, ¿habría actuado igual?`,
  conversar:`¿Existe la ira justa, o toda ira es un error de juicio bien disfrazado?`,
  preguntaIncomoda:`¿Cuántas veces tu "tenía razón" justificó algo de lo que después te arrepentiste?`,
  frase:{ texto:`El mejor remedio contra la ira es la demora.`, autor:"Séneca", obra:"De la ira, II, 29", tipo:"traduccion" },
  charlas:[
    { nivel:"Simple",  tema:"¿Contar hasta diez funciona con la ira?", postura:"Sí: la demora deja entrar a la razón.", contra:"A veces hay que reaccionar al instante.", pregunta:"¿Esperar es prudencia o cobardía?" },
    { nivel:"Profundo",tema:"¿La ira sirve para algo?", postura:"Señala una injusticia, pero es mala consejera para responderla.", contra:"Sin algo de ira, ¿quién pelea contra el abuso?", pregunta:"¿Se puede combatir la injusticia sin que la ira mande?" },
    { nivel:"Filoso",  tema:"¿Es libre quien actúa con ira?", postura:"No: actúa dominado por una pasión.", contra:"La ira también puede ser una elección.", pregunta:"¿Dónde acaba sentir rabia y empieza ser su esclavo?" }
  ]
},
{
  dia:13, ruta:1, titulo:"La vida no es corta",
  escuela:"Estoicismo romano · Séneca", duracion:"5–8 min", temas:["disciplina","muerte"],
  entrada:`No te falta tiempo. Te sobra desperdicio. Esa es la incómoda tesis de Séneca sobre tu vida.`,
  contexto:`En "De la brevedad de la vida", Séneca da vuelta la queja eterna —"la vida es demasiado corta"—: no recibimos una vida breve, la hacemos breve malgastándola. El problema no es la cantidad de tiempo, sino el uso.`,
  ideaCentral:`La vida es lo bastante larga para quien sabe administrarla. La sensación de que el tiempo no alcanza casi nunca viene de su escasez real, sino de regalarlo: a lo trivial, a lo ajeno, a la distracción, a la postergación.`,
  desarrollo:`Cuidamos celosamente el dinero y la propiedad, pero entregamos el tiempo —el único bien que no se recupera— a cualquiera que lo pida. Horas en pantallas que no elegimos, años esperando "el momento adecuado", energía en lo que ni recordaremos. Vivir bien empieza por una contabilidad honesta: ¿en qué se me va de verdad la vida?`,
  ejemplo:`Dices que no tienes tiempo para lo que importa —tu familia, tu salud, ese proyecto— y sin embargo el día se esfuma en pequeñas fugas que ni decidiste. No te robaron el tiempo: lo fuiste soltando, gota a gota.`,
  aplicacion:`Hoy, haz una auditoría breve: ¿a qué le regalaste tiempo sin decidirlo? Recupera mañana una sola hora para algo que de verdad valga.`,
  contraste:`El crítico dirá que no todo es productividad: descansar, no hacer nada, también es vivir. Cierto, y Séneca estaría de acuerdo: el punto no es llenar cada hora, sino que el tiempo sea tuyo —elegido—, no robado por la inercia.`,
  practica:`Antes de dormir, repasa el día y pregúntate: "¿cuánto de hoy lo viví yo, y cuánto se me vivió solo?".`,
  conversar:`Si el tiempo fuera dinero visible, ¿en qué descubrirías que estás en bancarrota?`,
  preguntaIncomoda:`¿Estás esperando "tener tiempo" para vivir, mientras la vida es exactamente este tiempo?`,
  frase:{ texto:`No recibimos una vida corta, sino que la hacemos corta.`, autor:"Séneca", obra:"De la brevedad de la vida, 1", tipo:"traduccion" },
  charlas:[
    { nivel:"Simple",  tema:"¿Perder el tiempo está mal?", postura:"Depende: descansar es vivir; la inercia, no.", contra:"Nadie puede elegir cada minuto.", pregunta:"¿Cuál es la diferencia entre descansar y desperdiciar?" },
    { nivel:"Profundo",tema:"¿Por qué regalamos el tiempo tan fácil?", postura:"Porque no lo vemos agotarse, como sí vemos el dinero.", contra:"A veces el tiempo 'perdido' es el más feliz.", pregunta:"¿Todo tiempo debe ser útil para estar bien usado?" },
    { nivel:"Filoso",  tema:"Si el tiempo es lo único irrecuperable, ¿es el bien supremo?", postura:"Es el material del que está hecha tu vida.", contra:"De nada sirve el tiempo sin sentido para llenarlo.", pregunta:"¿Vale más tener tiempo o tener razones para usarlo?" }
  ]
},
{
  dia:14, ruta:1, titulo:"Eres lo que repites",
  escuela:"Aristóteles · con lectura estoica", duracion:"5–8 min", temas:["virtud","disciplina"],
  entrada:`La virtud no es un rayo que cae: es un músculo que se entrena. Y como todo músculo, se hace con repetición.`,
  contexto:`Aristóteles, en la "Ética a Nicómaco", enseña que la virtud no es innata ni se obtiene sólo pensando: se adquiere practicándola. Nos volvemos justos haciendo actos justos. (Aviso honesto: la célebre frase "somos lo que hacemos repetidamente; la excelencia es un hábito" NO es de Aristóteles, sino un resumen suyo escrito por Will Durant en 1926. La idea es aristotélica; esas palabras exactas, no.)`,
  ideaCentral:`El carácter es el sedimento de tus actos repetidos. No eres virtuoso por desearlo ni por entenderlo, sino por hacerlo una y otra vez, hasta que deja de costar. La buena vida se construye en hábitos, no en intenciones.`,
  desarrollo:`Esto desinfla dos engaños cómodos. El primero: creer que saber lo correcto basta —no basta, hay que practicarlo—. El segundo: esperar a "sentirse" virtuoso —el sentimiento llega después del hábito, no antes—. Empiezas actuando como quisieras ser, aunque al principio sea torpe y forzado, y con la repetición te conviertes en eso. Los estoicos coincidían: la filosofía es ejercicio diario, no teoría de salón.`,
  ejemplo:`Quieres ser una persona paciente. No lo serás por desearlo en abstracto. Lo serás eligiendo, una pequeña vez tras otra —en la fila, con tu hijo, en el tráfico—, la respuesta paciente, hasta que sea tu modo por defecto.`,
  aplicacion:`Hoy, elige una sola virtud y practícala en un acto concreto, por pequeño que sea. El acto importa más que la intención. Mañana, repítelo.`,
  contraste:`Un crítico romántico dirá que el carácter auténtico nace de dentro, no de "fingir" hábitos. Aristóteles responde: no es fingir, es entrenar; el actor se vuelve aquello que ensaya. No esperas ser bueno para actuar bien: actúas bien hasta volverte bueno.`,
  practica:`Antes de dormir, identifica un hábito pequeño que, repetido un año, te haría mejor persona. Comprométete con su primera repetición mañana.`,
  conversar:`¿El carácter se nace o se hace?`,
  preguntaIncomoda:`¿Cuál de tus defectos no es un rasgo, sino sólo un mal hábito que dejas de cuestionar?`,
  frase:{ texto:`Nos volvemos justos practicando actos justos, y valientes practicando actos valientes.`, autor:"Aristóteles", obra:"Ética a Nicómaco, II, 1", tipo:"parafrasis" },
  charlas:[
    { nivel:"Simple",  tema:"¿Se puede cambiar el carácter?", postura:"Sí, repitiendo actos distintos.", contra:"Hay temperamentos muy tercos.", pregunta:"¿Cuánto de ti es fijo y cuánto entrenable?" },
    { nivel:"Profundo",tema:"¿Fingir una virtud hasta tenerla es honesto?", postura:"No es fingir, es ensayar lo que quieres ser.", contra:"Suena a máscara.", pregunta:"¿Eres tu intención o tus actos?" },
    { nivel:"Filoso",  tema:"Si eres tus hábitos, ¿dónde queda el 'yo' que los elige?", postura:"El yo es justamente quien decide qué repetir.", contra:"Muchos hábitos los elige el entorno, no tú.", pregunta:"¿Somos autores o productos de nuestras costumbres?" }
  ]
},
{
  dia:15, ruta:1, titulo:"No el sabio, sino el que progresa",
  escuela:"Estoicismo romano · Epicteto", duracion:"5–8 min", temas:["virtud","disciplina"],
  entrada:`El estoicismo no te pide ser perfecto. Te pide algo más honesto y más difícil: progresar.`,
  contexto:`Los estoicos hablaban del "sabio" como un ideal casi inalcanzable —alguien perfectamente virtuoso— y eran los primeros en admitir que casi nadie lo es. Lo que sí podemos ser es el que avanza, el que progresa. Epicteto dedicó buena parte de su enseñanza a esa figura realista.`,
  ideaCentral:`La meta no es la perfección moral, sino la dirección. No se trata de no caer nunca, sino de levantarse, mirar el tropiezo sin dramatizarlo y seguir. El estoico maduro mide su día no contra un ideal imposible, sino contra su propio progreso.`,
  desarrollo:`Esto cierra los fundamentos con realismo. Un signo de progreso, decía Epicteto, es dejar de culpar a los demás de tus males —eso es no haber empezado—, pasar a examinarte a ti mismo —ahí empieza la educación— y, finalmente, no culpar a nadie, ni a otros ni a ti. No es indiferencia: es cambiar el juicio destructivo por la corrección serena. Caes, anotas, ajustas, sigues.`,
  ejemplo:`Llevas una semana practicando la pausa antes de la ira y hoy estallaste igual. La voz perfeccionista dice "no sirvo para esto". La voz del que progresa dice: "una de siete; ayer ni lo habría notado". Y mañana lo intenta de nuevo.`,
  aplicacion:`Hoy, al revisar tu día, no te midas contra la perfección. Pregúntate sólo: "¿avancé un paso, aunque sea pequeño?". Si caíste, anótalo sin castigarte y planifica el siguiente intento.`,
  contraste:`El crítico dirá que sin exigir perfección uno se acomoda en la mediocridad. El estoico responde: la perfección imposible no motiva, frustra; el progreso medible sostiene el esfuerzo año tras año. Se avanza más apuntando a mejorar que a ser impecable.`,
  practica:`Antes de dormir, reconoce un solo avance del día —por mínimo que sea— y una sola cosa a corregir mañana, sin reproche. Esa es la contabilidad del que progresa.`,
  conversar:`¿Motiva más buscar la perfección o medir el progreso?`,
  preguntaIncomoda:`Cuando fallas, ¿usas el "no sirvo" como verdad, o como excusa cómoda para dejar de intentar?`,
  frase:{ texto:`No acusar a otros ni a uno mismo es señal de que la formación está completa.`, autor:"Epicteto", obra:"Enquiridión, 5", tipo:"traduccion" },
  charlas:[
    { nivel:"Simple",  tema:"¿Está bien conformarse con 'progresar'?", postura:"No es conformarse; es avanzar de verdad, sin fantasía.", contra:"Sin meta alta, ¿se llega lejos?", pregunta:"¿Motiva más un ideal o un progreso visible?" },
    { nivel:"Profundo",tema:"¿Por qué nos castigamos al fallar?", postura:"Confundimos el error con la identidad.", contra:"Cierta autoexigencia empuja a mejorar.", pregunta:"¿Dónde acaba exigirse y empieza maltratarse?" },
    { nivel:"Filoso",  tema:"Si el sabio perfecto no existe, ¿para qué sirve el ideal?", postura:"Marca la dirección, aunque no se alcance.", contra:"Un ideal inalcanzable puede sólo frustrar.", pregunta:"¿Necesitamos metas imposibles para movernos?" }
  ]
},
{
  dia:16, ruta:2, titulo:"La disciplina del deseo",
  escuela:"Estoicismo romano · Epicteto", duracion:"5–8 min", temas:["deseo","control"],
  entrada:`El deseo promete y rara vez cumple a tiempo. Antes de aprender a desear bien, conviene aprender a desear menos.`,
  contexto:`Epicteto, en el "Enquiridión" cap. 2, propone una medida drástica para empezar: por ahora, suspende casi por completo el deseo. Primero se entrena la abstención; después, el deseo dirigido.`,
  ideaCentral:`El deseo mal puesto —en lo que no controlas— es fuente segura de frustración. La primera disciplina estoica es la del deseo: querer sobre todo aquello que sí depende de ti.`,
  desarrollo:`No es matar el deseo, es reeducarlo. Mientras tu felicidad cuelgue de conseguir cosas externas, vives en tensión permanente. Si trasladas el deseo a lo interno —actuar bien, mejorar tu juicio—, dejas de fallar por causas ajenas. Empezar suspendiendo deseos externos es como soltar peso para aprender a caminar derecho.`,
  ejemplo:`Deseas con ansias que te asciendan y cada día sin noticias te amarga. Si en cambio deseas dar lo mejor en tu trabajo —eso sí es tuyo—, el ascenso pasa a ser bienvenido, no indispensable.`,
  aplicacion:`Hoy elige un deseo externo que te tenga tenso y, por un día, suspéndelo: actúa bien sin exigir el resultado.`,
  contraste:`El crítico dirá que sin deseo no hay ambición ni motor. El estoico responde: no apaga el motor, lo conecta a lo que sí puede mover; desear lo imposible no es ambición, es desgaste.`,
  practica:`Antes de dormir, nombra un deseo que hoy te quitó paz y pregúntate: ¿esto depende de mí? Si no, déjalo descansar esta noche.`,
  conversar:`¿Se puede ser ambicioso y sereno a la vez?`,
  preguntaIncomoda:`¿Cuántos de tus deseos son tuyos, y cuántos te los instalaron de afuera?`,
  frase:{ texto:`Por ahora, suprime el deseo por completo.`, autor:"Epicteto", obra:"Enquiridión, 2", tipo:"parafrasis" },
  charlas:[
    { nivel:"Simple",  tema:"¿Desear menos es vivir con menos ganas?", postura:"Es desear lo que sí depende de ti.", contra:"Sin deseos fuertes, ¿qué te mueve?", pregunta:"¿Motiva más lograr o mejorar?" },
    { nivel:"Profundo",tema:"¿Se educa el deseo o sólo se reprime?", postura:"Se reorienta hacia lo interno.", contra:"Reprimir y reorientar a veces se confunden.", pregunta:"¿Dónde acaba el dominio y empieza la represión?" },
    { nivel:"Filoso",  tema:"Si deseo sólo lo que controlo, ¿no me encierro en mí?", postura:"Actúas en el mundo sin depender de su veredicto.", contra:"Suena a blindaje egoísta.", pregunta:"¿Es libertad o resignación elegante?" }
  ]
},
{
  dia:17, ruta:2, titulo:"Los deseos naturales y los vanos",
  escuela:"Epicureísmo · Epicuro", duracion:"5–8 min", temas:["deseo","control"],
  entrada:`No todos los deseos pesan igual. Distinguirlos es el primer paso para dejar de correr detrás de los que nunca sacian.`,
  contexto:`Epicuro, en su "Carta a Meneceo", clasifica los deseos: naturales y necesarios (comida, abrigo, amistad), naturales pero no necesarios (lujos) y vanos (riqueza o fama sin límite). Es un mapa epicúreo, pero los estoicos comparten la sospecha hacia el deseo ilimitado.`,
  ideaCentral:`Los deseos vanos no tienen techo: por definición, nunca se llenan. Identificar cuáles de tus deseos son necesarios y cuáles vanos te libera de una carrera sin meta.`,
  desarrollo:`El sufrimiento del deseo vano es que su satisfacción genera más deseo, no calma. Más dinero pide más dinero; más reconocimiento, más. Los deseos naturales, en cambio, se sacian con poco. Mapear tus deseos —¿lo necesito o sólo lo quiero sin fin?— desactiva muchas angustias en su raíz.`,
  ejemplo:`Cambias de auto y la satisfacción dura dos semanas; pronto miras el siguiente modelo. El deseo de estatus no tenía fondo. El de moverte con dignidad, sí, y ya estaba cubierto.`,
  aplicacion:`Hoy, ante un deseo de compra o logro, clasifícalo: ¿natural y necesario, natural no necesario, o vano? Decide con esa etiqueta a la vista.`,
  contraste:`Aquí estoicos y epicúreos se dan la mano por caminos distintos: el epicúreo recorta deseos para gozar en paz; el estoico, para no depender de lo externo. Un crítico moderno dirá que algo de deseo "vano" mueve la economía y la creatividad. Cierto: el punto no es no desear, es no ser su esclavo.`,
  practica:`Antes de dormir, escribe un deseo vano que hoy te rondó y, al lado, qué necesidad real hay debajo. Casi siempre la necesidad es más pequeña.`,
  conversar:`¿Cuál de tus deseos, satisfecho, sólo abrió la puerta a otro mayor?`,
  preguntaIncomoda:`¿Persigues cosas que quieres, o cosas que te enseñaron a querer?`,
  frase:{ texto:`De los deseos, unos son naturales y otros vanos.`, autor:"Epicuro", obra:"Carta a Meneceo", tipo:"parafrasis" },
  charlas:[
    { nivel:"Simple",  tema:"¿Está mal querer lujos?", postura:"No, mientras no dependas de ellos.", contra:"El gusto por lo bello también es humano.", pregunta:"¿Dónde acaba disfrutar y empieza necesitar?" },
    { nivel:"Profundo",tema:"¿Por qué el deseo vano no se sacia?", postura:"Su objeto es el 'más', no una meta.", contra:"Algunos logros sí sacian.", pregunta:"¿Existe un 'suficiente' o siempre se corre el límite?" },
    { nivel:"Filoso",  tema:"Si recortas deseos, ¿vives más libre o más pequeño?", postura:"Más libre: menos cadenas externas.", contra:"Quizá también menos vida y aventura.", pregunta:"¿La libertad es tener menos deseos o cumplirlos todos?" }
  ]
},
{
  dia:18, ruta:2, titulo:"Restar deseos, no sumar bienes",
  escuela:"Estoicismo romano · Séneca", duracion:"5–8 min", temas:["deseo","disciplina"],
  entrada:`Hay dos formas de volverte rico: ganar más o necesitar menos. Sólo una depende de ti.`,
  contexto:`En la Carta 21 a Lucilio, Séneca cita con aprobación a Epicuro: si quieres hacer rico a alguien, no le añadas dinero, réstale deseos. La verdadera abundancia no es cuánto tienes, sino cuán poco te falta.`,
  ideaCentral:`La riqueza es una relación, no una cifra: la distancia entre lo que tienes y lo que deseas. Puedes cerrarla sumando bienes —difícil, lento, dependiente del mundo— o restando deseos —posible hoy, depende de ti—.`,
  desarrollo:`Quien sólo persigue tener más nunca llega, porque el deseo corre más rápido que la cuenta bancaria. Quien aprende a necesitar menos descubre que ya es suficientemente rico. No es elogio de la pobreza: es independencia. El que necesita poco es difícil de comprar y difícil de asustar.`,
  ejemplo:`Dos personas ganan lo mismo. Una vive ahogada porque su deseo siempre va un paso adelante; la otra vive holgada porque ajustó su deseo. El número era idéntico; la diferencia estaba dentro.`,
  aplicacion:`Hoy, en vez de pensar "¿qué me falta para estar bien?", prueba: "¿qué deseo podría soltar para estar bien ya?".`,
  contraste:`El crítico dirá que esto puede volverse excusa para conformarse y no progresar. El estoico distingue: trabaja y prospera todo lo que quieras, pero que tu paz no quede rehén del próximo aumento.`,
  practica:`Antes de dormir, identifica una cosa que creías "necesitar" y que en realidad sólo deseas. Réstala mentalmente y nota si pierdes algo real.`,
  conversar:`¿Eres rico por lo que tienes o por lo que no necesitas?`,
  preguntaIncomoda:`¿Tu sensación de que "no alcanza" es por ingresos, o por deseos que no paran de crecer?`,
  frase:{ texto:`Si quieres hacer rico a alguien, no le añadas dinero, réstale deseos.`, autor:"Séneca", obra:"Cartas a Lucilio, 21 (citando a Epicuro)", tipo:"traduccion" },
  charlas:[
    { nivel:"Simple",  tema:"¿Necesitar menos es resignarse?", postura:"Es ganar independencia.", contra:"A veces necesitar más impulsa a crecer.", pregunta:"¿Suma más libertad tener o no necesitar?" },
    { nivel:"Profundo",tema:"¿Por qué el deseo corre más que el ingreso?", postura:"Se adapta al alza y siempre pide lo siguiente.", contra:"Hay quien sí encuentra su 'suficiente'.", pregunta:"¿Se puede fijar un techo al deseo a voluntad?" },
    { nivel:"Filoso",  tema:"¿La riqueza es objetiva o una relación mental?", postura:"Es la distancia entre lo que tienes y lo que quieres.", contra:"La pobreza material es muy real.", pregunta:"¿Puede ser rico el que tiene poco y pobre el que tiene mucho?" }
  ]
},
{
  dia:19, ruta:2, titulo:"La fama y la mirada ajena",
  escuela:"Estoicismo romano · Marco Aurelio", duracion:"5–8 min", temas:["deseo","virtud"],
  entrada:`Vivir pendiente de lo que piensen de ti es entregar el timón a gente que apenas piensa en ti.`,
  contexto:`Marco Aurelio, que tenía toda la fama posible como emperador, vuelve en sus "Meditaciones" sobre su poco valor: quienes te aplauden hoy morirán pronto, y el recuerdo se borra. La fama póstuma, dice, es humo que el viento dispersa.`,
  ideaCentral:`El deseo de reconocimiento te hace esclavo de la opinión de otros, que ni controlas ni conoces de verdad. La virtud no necesita público; se basta a sí misma.`,
  desarrollo:`Buscar la aprobación ajena tiene dos trampas: es inestable —hoy te alaban, mañana te olvidan— y te corrompe —terminas actuando para la galería, no por lo correcto—. El estoico no desprecia el buen nombre, pero no lo persigue: hace lo que debe, y si llega el reconocimiento, lo recibe sin depender de él.`,
  ejemplo:`Publicas algo y revisas obsesivamente los "me gusta". Tu ánimo sube y baja con cifras de desconocidos. El día que dejas de medirte por ellos, recuperas el día.`,
  aplicacion:`Hoy, haz una cosa buena que nadie verá ni aplaudirá. Nota que tu valor no cambió por falta de público.`,
  contraste:`Aristóteles consideraba el honor un bien valioso, aunque no el supremo. El estoico es más severo: el honor depende de otros, así que no puede ser tu base. Un crítico dirá que la reputación abre puertas reales —y es cierto—: úsala, pero no te dejes gobernar por ella.`,
  practica:`Antes de dormir, revisa una decisión de hoy: ¿la tomé por lo correcto, o por cómo me verían?`,
  conversar:`¿Es posible no necesitar nada de la aprobación ajena, o es parte de ser humano?`,
  preguntaIncomoda:`¿Cuánto de lo que haces lo harías igual si nadie pudiera enterarse?`,
  frase:{ texto:`Quien ansía la fama tras la muerte olvida que quienes lo recuerden también morirán pronto.`, autor:"Marco Aurelio", obra:"Meditaciones, IV, 19", tipo:"parafrasis" },
  charlas:[
    { nivel:"Simple",  tema:"¿Está mal querer que te valoren?", postura:"Querer sí; depender, no.", contra:"El reconocimiento motiva y une.", pregunta:"¿Se puede disfrutar el aplauso sin necesitarlo?" },
    { nivel:"Profundo",tema:"¿Por qué nos importa tanto la opinión ajena?", postura:"Venimos cableados para el grupo.", contra:"Entonces es natural, no un error.", pregunta:"¿Se puede domesticar ese instinto sin negarlo?" },
    { nivel:"Filoso",  tema:"Si nadie te recuerda, ¿tu vida valió menos?", postura:"El valor está en cómo viviste, no en quién lo recuerde.", contra:"Sin memoria, ¿qué queda?", pregunta:"¿El sentido necesita testigos?" }
  ]
},
{
  dia:20, ruta:2, titulo:"El placer y la suficiencia",
  escuela:"Epicureísmo · Epicuro", duracion:"5–8 min", temas:["deseo","disciplina"],
  entrada:`El que necesita un banquete para disfrutar es, en el fondo, más pobre que el que goza con pan y agua.`,
  contexto:`Epicuro —mal entendido como hedonista de excesos— vivía con extrema sencillez. Enseñaba que el pan y el agua dan el placer más alto a quien los necesita, y que el lujo se aprecia mejor desde la frugalidad.`,
  ideaCentral:`La templanza no es renuncia al placer: es la condición para disfrutarlo de verdad. Quien acostumbra su deseo a poco goza de todo; quien lo acostumbra al exceso, no goza de nada.`,
  desarrollo:`Hay una paradoja: el exceso embota. El que come manjares cada día deja de saborearlos; el que rara vez los prueba, los disfruta intensamente. Bajar el umbral del deseo multiplica el placer disponible. No es sufrir privaciones: es no volverse esclavo de lo caro y lo raro para poder estar bien.`,
  ejemplo:`Vuelves de un viaje austero y un plato simple en casa te sabe a gloria. No cambió la comida: cambió tu deseo, recalibrado por la sencillez.`,
  aplicacion:`Hoy, disfruta a conciencia algo simple —un café, un vaso de agua fría, el silencio— como si fuera un lujo. Lo es, para quien sabe mirarlo.`,
  contraste:`El estoico va un paso más allá del epicúreo: no busca el placer como fin, sino la virtud; pero coincide en la frugalidad como entrenamiento de libertad. Un crítico dirá que privarse por deporte es masoquismo. No es privarse por privarse: es no quedar atado a lo que podrías perder.`,
  practica:`Antes de dormir, recuerda un placer simple de hoy que casi no notaste. Agradécelo como lo que es: gratis y suficiente.`,
  conversar:`¿El lujo aumenta el placer o lo encarece?`,
  preguntaIncomoda:`¿Necesitas cada vez más para sentir lo mismo? ¿Quién decide ese "más"?`,
  frase:{ texto:`El pan y el agua dan el placer más alto a quien los lleva a sus labios por necesidad.`, autor:"Epicuro", obra:"Carta a Meneceo", tipo:"parafrasis" },
  charlas:[
    { nivel:"Simple",  tema:"¿Disfrutar lujos está mal?", postura:"No, mientras no los necesites para estar bien.", contra:"Lo bueno también merece gozarse.", pregunta:"¿Disfrutas más lo raro o lo cotidiano?" },
    { nivel:"Profundo",tema:"¿Por qué el exceso embota?", postura:"La costumbre apaga la sensación.", contra:"Hay placeres que no cansan.", pregunta:"¿Se puede gozar mucho sin acostumbrarse?" },
    { nivel:"Filoso",  tema:"Si lo simple basta, ¿para qué aspirar a más?", postura:"Aspirar está bien; depender, no.", contra:"Sin ambición de más, ¿hay progreso?", pregunta:"¿Suficiencia y ambición pueden convivir?" }
  ]
},
{
  dia:21, ruta:2, titulo:"El miedo a la muerte",
  escuela:"Epicureísmo · Epicuro", duracion:"5–8 min", temas:["miedo","muerte"],
  entrada:`El miedo que envenena más vidas es el miedo a algo que, por definición, nunca llegaremos a vivir.`,
  contexto:`Epicuro, en la "Carta a Meneceo", ofrece su famoso argumento contra el miedo a morir: mientras existimos, la muerte no está; cuando la muerte está, ya no existimos. Por tanto, no nos concierne mientras vivimos.`,
  ideaCentral:`La muerte no es una experiencia que sufriremos: es el fin de toda experiencia. Temerla es temer una nada que nunca padeceremos. Lo que tememos, en realidad, es perder la vida, no "estar muertos".`,
  desarrollo:`El argumento no elimina el dolor de las despedidas ni el instinto de supervivencia, pero desarma el terror abstracto. Si la muerte no se vive, no hay "ahí" un sufrimiento esperándote. El estoico añade su matiz: úsala además como brújula (la noche 5). Entre ambos, te quitan el miedo y te ordenan la vida.`,
  ejemplo:`Te despierta de madrugada el pensamiento de morir. El argumento epicúreo te recuerda: en ese estado que temes, no habrá un "tú" sufriéndolo. El miedo se afloja, no por valentía, por lógica.`,
  aplicacion:`Hoy, si aparece el miedo a la muerte, sepáralo en dos: ¿temo el dolor de despedirme de la vida, o temo "estar muerto"? Lo segundo, según Epicuro, no te tocará.`,
  contraste:`Un crítico dirá que el argumento es frío y no consuela ante la pérdida de seres queridos. Justo: no pretende eso. Atiende el miedo a la propia muerte, no el duelo. Para el duelo hacen falta otras herramientas.`,
  practica:`Antes de dormir, en vez de temer el final, agradece que hoy estuviste vivo. La conciencia de la finitud puede volverse gratitud, no pánico.`,
  conversar:`¿Tememos morir, o tememos dejar de vivir?`,
  preguntaIncomoda:`Si la muerte no se sufre, ¿qué es exactamente lo que te asusta de ella?`,
  frase:{ texto:`La muerte nada es para nosotros: mientras existimos no está, y cuando está ya no existimos.`, autor:"Epicuro", obra:"Carta a Meneceo", tipo:"parafrasis" },
  charlas:[
    { nivel:"Simple",  tema:"¿Sirve un argumento contra el miedo a morir?", postura:"Afloja el terror abstracto.", contra:"El miedo no es lógico, es visceral.", pregunta:"¿Se razona el miedo o sólo se siente?" },
    { nivel:"Profundo",tema:"¿Tememos la muerte o el morir?", postura:"Casi siempre el proceso y la pérdida, no el después.", contra:"Hay un vértigo ante la nada misma.", pregunta:"¿Se puede temer una nada?" },
    { nivel:"Filoso",  tema:"Si la muerte no se vive, ¿es un mal?", postura:"No es un mal experimentado por nadie.", contra:"Priva de todos los bienes futuros.", pregunta:"¿Puede algo dañarte cuando ya no estás?" }
  ]
},
{
  dia:22, ruta:2, titulo:"El dolor, ese huésped breve",
  escuela:"Estoicismo romano · Séneca", duracion:"5–8 min", temas:["miedo","disciplina"],
  entrada:`El dolor asusta más de lejos que de cerca. Visto con calma, casi siempre es más corto o más leve de lo que tememos.`,
  contexto:`Séneca, de salud frágil toda su vida, escribió sobre el dolor desde la experiencia. En la Carta 78 recoge una idea de Epicuro y la hace suya: el dolor intenso es breve, y el prolongado es soportable. Lo insoportable y eterno a la vez casi no existe.`,
  ideaCentral:`El sufrimiento se agranda con la anticipación y la queja. Mirado de frente, el dolor o es agudo y pasa pronto, o es llevadero y permite seguir viviendo. Añadirle pánico y autocompasión lo duplica.`,
  desarrollo:`No es negar el dolor ni hacerse el duro: es no sumarle un segundo dolor mental encima del físico. Gran parte de lo que llamamos sufrimiento es el relato que tejemos —"esto no va a parar nunca", "no lo soporto"—. Quitar ese relato no quita el dolor, pero le baja el volumen y devuelve el control.`,
  ejemplo:`Una jaqueca fuerte. Si te dices "esto es horrible e interminable", se vuelve insoportable. Si la observas —"intenso, pero pasará"—, sigue doliendo, pero ya no te derriba.`,
  aplicacion:`Hoy, ante una molestia física, no le agregues catástrofe. Obsérvala y nómbrala: "¿es agudo y breve, o leve y largo?". Casi siempre es una de las dos.`,
  contraste:`El crítico advierte —con razón— que hay dolores crónicos y severos que esta idea no resuelve. Verdad: el estoicismo no promete anestesia, sino no rendir la mente además del cuerpo. Para el dolor real existen también la medicina y la ayuda; pedirlas también es sabiduría.`,
  practica:`Antes de dormir, recuerda una molestia de hoy y separa el dolor real del drama que le añadiste. Devuélvele su tamaño verdadero.`,
  conversar:`¿Cuánto de un dolor es la sensación y cuánto es el miedo a la sensación?`,
  preguntaIncomoda:`¿Tu "no lo soporto" es verdad, o una frase que empeora lo que sí podrías soportar?`,
  frase:{ texto:`El dolor intenso es breve; el prolongado, leve.`, autor:"Séneca", obra:"Cartas a Lucilio, 78", tipo:"parafrasis" },
  charlas:[
    { nivel:"Simple",  tema:"¿Aguantar el dolor es ser fuerte?", postura:"Es no añadirle pánico inútil.", contra:"A veces hay que atender el dolor, no aguantarlo.", pregunta:"¿Cuándo resistir y cuándo pedir ayuda?" },
    { nivel:"Profundo",tema:"¿El relato cambia el dolor?", postura:"Le sube o le baja el volumen.", contra:"El dolor físico no es sólo mental.", pregunta:"¿Dónde acaba el cuerpo y empieza la mente?" },
    { nivel:"Filoso",  tema:"Si todo dolor pasa o se soporta, ¿por qué lo tememos tanto?", postura:"Tememos su imagen más que su realidad.", contra:"Hay dolores que rompen de verdad.", pregunta:"¿Es el sufrimiento un hecho o una interpretación?" }
  ]
},
{
  dia:23, ruta:2, titulo:"Ensayar la pobreza",
  escuela:"Estoicismo romano · Séneca", duracion:"5–8 min", temas:["miedo","deseo","disciplina"],
  entrada:`La mejor forma de perderle el miedo a quedarte sin nada es probar, a propósito y por unos días, cómo se vive con poco.`,
  contexto:`Séneca aconseja en la Carta 18 una práctica concreta: aparta unos días para contentarte con la comida más simple y la ropa más basta, y pregúntate "¿es esto lo que tanto temía?". Casi siempre, no lo es.`,
  ideaCentral:`El miedo a perder lo que tienes pierde su poder cuando compruebas, en carne propia, que podrías vivir con menos. Quien ha ensayado la escasez deja de temerla, y por tanto deja de ser su rehén.`,
  desarrollo:`No es masoquismo ni desprecio de lo que tienes: es un seguro contra el miedo. El que nunca ha vivido con poco le teme a lo desconocido; el que lo ha probado sabe que es habitable. Esa certeza te hace libre: ya no puedes ser chantajeado con la amenaza de la pérdida, porque conoces el supuesto abismo y resultó ser suelo firme.`,
  ejemplo:`Pasas un fin de semana sin gastar, comiendo simple, sin pantallas ni lujos. El lunes descubres dos cosas: que se vive bien con poco, y que valoras más lo que tienes. El miedo a "perderlo todo" se encogió.`,
  aplicacion:`Esta semana, elige un día de sencillez deliberada: lo mínimo necesario. Al final, pregúntate si era de verdad tan temible.`,
  contraste:`El crítico dirá que jugar a ser pobre desde la comodidad es un privilegio, no una virtud. Tiene parte de razón: el ejercicio es para quien teme perder, no una lección para quien ya carece. Bien entendido, no romantiza la pobreza: vacuna contra el miedo.`,
  practica:`Antes de dormir, imagina que perdieras un bien que valoras. Pregúntate con calma: ¿seguiría siendo capaz de vivir y de ser yo? La respuesta suele aflojar el nudo.`,
  conversar:`¿Lo que tienes te da seguridad, o te da miedo de perderlo?`,
  preguntaIncomoda:`¿Cuánto de tu esfuerzo es por vivir mejor, y cuánto por puro miedo a caer?`,
  frase:{ texto:`Aparta unos días para contentarte con lo más escaso, y pregúntate: ¿es esto lo que temía?`, autor:"Séneca", obra:"Cartas a Lucilio, 18", tipo:"parafrasis" },
  charlas:[
    { nivel:"Simple",  tema:"¿Vivir con poco a propósito sirve de algo?", postura:"Te quita el miedo a perder.", contra:"Suena a postura de privilegiado.", pregunta:"¿Se entrena el desapego o sólo se finge?" },
    { nivel:"Profundo",tema:"¿Por qué tememos tanto perder lo que tenemos?", postura:"Confundimos lo que tenemos con lo que somos.", contra:"La seguridad material es real y necesaria.", pregunta:"¿Dónde acaba prudencia y empieza miedo?" },
    { nivel:"Filoso",  tema:"Si pudieras vivir con nada, ¿qué te ata a tener tanto?", postura:"A menudo, el miedo más que la necesidad.", contra:"Tener también permite cuidar a otros.", pregunta:"¿Acumulamos para vivir o para no temer?" }
  ]
},
{
  dia:24, ruta:2, titulo:"Atreverse",
  escuela:"Estoicismo romano · Séneca", duracion:"5–8 min", temas:["miedo","control"],
  entrada:`Muchas cosas no las haces porque te parecen difíciles. Pero a menudo se vuelven difíciles sólo porque no te atreves.`,
  contexto:`Séneca, en la Carta 104, da vuelta una excusa común: no nos atrevemos a ciertas cosas porque son difíciles, pero son difíciles porque no nos atrevemos. El miedo, más que la dificultad real, es lo que paraliza.`,
  ideaCentral:`Buena parte de la dificultad que ves está construida por tu propio miedo. Lo que de lejos parece un muro, de cerca suele ser un escalón. Atreverse a empezar disuelve la mitad del obstáculo.`,
  desarrollo:`El miedo infla las dimensiones de lo que evitamos. Postergamos una conversación, un cambio, un proyecto, y la postergación los agranda hasta volverlos monstruos. El coraje estoico no es ausencia de miedo: es dar el primer paso a pesar de él, y descubrir que el monstruo era más pequeño visto de frente.`,
  ejemplo:`Llevas meses sin pedir algo que necesitas —un aumento, una disculpa, una ayuda— porque "es difícil". El día que lo pides, dura cinco minutos. La dificultad vivía en la espera, no en el acto.`,
  aplicacion:`Hoy, identifica algo que vienes evitando por "difícil" y da el primer paso mínimo, hoy mismo. No el plan entero: el primer paso.`,
  contraste:`El crítico dirá que no todo miedo es ilusión: a veces lo difícil es difícil de verdad. Cierto, y el valor no es temeridad. Pero distingue: ¿es difícil el acto, o sólo me da miedo? Muchas veces, al mirar, era lo segundo.`,
  practica:`Antes de dormir, elige una sola cosa pendiente que el miedo agrandó. Decide el primer paso concreto que darás mañana, por pequeño que sea.`,
  conversar:`¿Cuántos de tus "no puedo" son en realidad "no me atrevo"?`,
  preguntaIncomoda:`¿Qué estás llamando "imposible" para no tener que intentarlo?`,
  frase:{ texto:`No nos atrevemos a ciertas cosas porque son difíciles; son difíciles porque no nos atrevemos.`, autor:"Séneca", obra:"Cartas a Lucilio, 104", tipo:"traduccion" },
  charlas:[
    { nivel:"Simple",  tema:"¿El miedo agranda los problemas?", postura:"Casi siempre, sí.", contra:"A veces el problema es grande de verdad.", pregunta:"¿Cómo sabes cuál es cuál sin intentarlo?" },
    { nivel:"Profundo",tema:"¿El coraje es no sentir miedo?", postura:"Es actuar a pesar de él.", contra:"Hay miedos que protegen.", pregunta:"¿Cuándo el miedo es guía y cuándo es cárcel?" },
    { nivel:"Filoso",  tema:"Si la dificultad la crea el miedo, ¿existe lo 'difícil' en sí?", postura:"Mucho de lo difícil es mental.", contra:"Hay límites reales, físicos y materiales.", pregunta:"¿La realidad pone los muros, o los ponemos nosotros?" }
  ]
},
{
  dia:25, ruta:2, titulo:"El que no puede ser ofendido",
  escuela:"Estoicismo romano · Séneca", duracion:"5–8 min", temas:["control","rabia"],
  entrada:`Nadie puede ofenderte sin tu permiso. La ofensa no está en lo que dicen, sino en que tú la aceptes.`,
  contexto:`Séneca dedicó el tratado "De la constancia del sabio" a una idea provocadora: al hombre justo y firme no se le puede dañar ni injuriar de verdad, porque la injuria sólo hiere a quien la recibe como tal.`,
  ideaCentral:`La ofensa requiere dos partes: quien la lanza y quien la recoge. Si no la recoges —si no aceptas el juicio del otro como veredicto sobre tu valor—, el insulto cae al suelo sin tocarte.`,
